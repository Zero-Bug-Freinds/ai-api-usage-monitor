# Local infrastructure for the monorepo (see docs/architecture.md §10, §10.1 패턴 B, §10.2 단일 도메인).
# Copy `.env.example` to `.env` and set secrets locally; do not commit `.env`.
#
# GATEWAY_SHARED_SECRET — api-gateway-service·proxy-service 환경에 `${GATEWAY_SHARED_SECRET:-}` 가 넘어간다.
#   .env 에서 변수를 빼면 Compose 가 빈 문자열을 주입해 Spring 이 application.yml 기본값을 못 쓸 수 있다.
#   비어 있지 않은 값으로 맞추거나(루트 .env.example 로컬 전용 문자열) 줄 자체를 두지 않는다.
#   게이트웨이·proxy·usage-service 의 shared-secret 은 동일해야 한다 — docs/contracts/gateway-proxy.md §5.
#
# [Java] 앱 이미지: proxy·api-gateway 는 각 디렉터리에서 ./gradlew bootJar 후 Dockerfile COPY.
# identity·usage 백엔드는 패턴 B Dockerfile 이 Gradle 을 이미지 안에서 실행(사전 JAR 불필요).
#   usage 백엔드: 저장소 루트에서 docker build -f services/usage-service/Dockerfile -t usage-service:local .
#
# identity-service, usage-service Spring 앱은 기본 Compose 에는 없고 호스트 실행 또는
# services/<svc>/docker-compose.yml 로 백+Next 스택 기동(루트 compose 와 DB·게이트웨이 맞출 것).
#
# [Next] 빌드: 저장소 루트에서 pnpm install 후 `pnpm build:web` 또는 각 web 에서 build.
#   Docker 이미지: build context 는 루트(.), dockerfile 은 services/<svc>/web/Dockerfile (workspace `packages/ui`).
#
# Next.js — 선택: docker compose --profile web up (identity-web + usage-web + billing-web + web-edge)
#   게이트웨이는 컨테이너 네트워크(api-gateway-service:8080)로 연결(API_GATEWAY_URL).
#   Identity BFF는 기본적으로 호스트의 identity-service 를 host.docker.internal 로 향함(WEB_IDENTITY_SERVICE_URL).
#   단일 도메인: web-edge(Nginx, docker/web-edge/nginx.conf) → 기본 ${WEB_EDGE_PORT:-8888}
#     /dashboard → 308 /dashboard/; 접두 /dashboard/ 만 usage-web(/dashboard2 는 제외); /api/v1 → 308 /api/v1/; 접두 /api/v1/ 만 api-gateway(버퍼링 끔·긴 timeout); 그 외 → identity-web.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-team:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      TEAM_POSTGRES_DB: ${TEAM_POSTGRES_DB:-team_db}
      TEAM_POSTGRES_USER: ${TEAM_POSTGRES_USER:-team_app}
      TEAM_POSTGRES_PASSWORD: ${TEAM_POSTGRES_PASSWORD:-team_app}
    ports:
      - "${TEAM_POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_team_data:/var/lib/postgresql/data
      - ./docker/postgres/init/postgres-team-init.sql:/docker-entrypoint-initdb.d/postgres-team-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-usage:
    image: postgres:16-alpine
    environment:
      # superuser credentials used by docker/postgres/init/02-create-usage-db.sh
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # usage-service only; init script 02-create-usage-db.sh (first boot / empty volume only)
      USAGE_POSTGRES_DB: ${USAGE_POSTGRES_DB:-usage_db}
      USAGE_POSTGRES_USER: ${USAGE_POSTGRES_USER:-usage_app}
      USAGE_POSTGRES_PASSWORD: ${USAGE_POSTGRES_PASSWORD:-usage_app}
    ports:
      - "5433:5432"
    volumes:
      - postgres_usage_data:/var/lib/postgresql/data
      - ./docker/postgres/init/02-create-usage-db.sh:/docker-entrypoint-initdb.d/02-create-usage-db.sh:ro

  postgres-billing:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      BILLING_POSTGRES_DB: ${BILLING_POSTGRES_DB:-billing_db}
      BILLING_POSTGRES_USER: ${BILLING_POSTGRES_USER:-billing_app}
      BILLING_POSTGRES_PASSWORD: ${BILLING_POSTGRES_PASSWORD:-billing_app}
    ports:
      - "${BILLING_POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_billing_data:/var/lib/postgresql/data
      - ./docker/postgres/init/03-create-billing-db.sh:/docker-entrypoint-initdb.d/03-create-billing-db.sh:ro

  postgres-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      NOTIFICATION_POSTGRES_DB: ${NOTIFICATION_POSTGRES_DB:-notification_db}
      NOTIFICATION_POSTGRES_USER: ${NOTIFICATION_POSTGRES_USER:-notification_app}
      NOTIFICATION_POSTGRES_PASSWORD: ${NOTIFICATION_POSTGRES_PASSWORD:-notification_app}
    ports:
      - "${NOTIFICATION_POSTGRES_PORT:-5436}:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
      - ./docker/postgres/init/04-create-notification-db.sh:/docker-entrypoint-initdb.d/04-create-notification-db.sh:ro

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  notification-service:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    depends_on:
      - postgres-notification
    environment:
      DATABASE_URL: postgresql://${NOTIFICATION_POSTGRES_USER:-notification_app}:${NOTIFICATION_POSTGRES_PASSWORD:-notification_app}@postgres-notification:5432/${NOTIFICATION_POSTGRES_DB:-notification_db}
      PORT: 8096
      NOTIFICATION_INTERNAL_SECRET: ${NOTIFICATION_INTERNAL_SECRET:-}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8096}:8096"

  proxy-service:
    build:
      context: ./services/proxy-service
    depends_on:
      - rabbitmq
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PROXY_KEY_SERVICE_BASE_URL: ${PROXY_KEY_SERVICE_BASE_URL:-http://host.docker.internal:8090}
      PROXY_OPENAI_TEST_API_KEY: ${PROXY_OPENAI_TEST_API_KEY:-}
      PROXY_GOOGLE_TEST_API_KEY: ${PROXY_GOOGLE_TEST_API_KEY:-}
      PROXY_MOCK_KEY_FALLBACK: ${PROXY_MOCK_KEY_FALLBACK:-}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROXY_SERVICE_PORT:-8081}:8081"

  api-gateway-service:
    build:
      context: ./services/api-gateway-service
    depends_on:
      - proxy-service
    environment:
      GATEWAY_PROXY_URI: http://proxy-service:8081
      GATEWAY_USAGE_URI: ${GATEWAY_USAGE_URI:-http://host.docker.internal:8092}
      # Host-run billing (bootRun default 8095). Override if billing runs elsewhere.
      GATEWAY_BILLING_URI: ${GATEWAY_BILLING_URI:-http://host.docker.internal:8095}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-}
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-}
      GATEWAY_DEV_MODE: ${GATEWAY_DEV_MODE:-true}
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"

  identity-web:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/identity-service/web/Dockerfile
      args:
        NEXT_PUBLIC_USAGE_WEB_ORIGIN: ${NEXT_PUBLIC_USAGE_WEB_ORIGIN:-http://usage-web:3000}
    depends_on:
      - api-gateway-service
    environment:
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://host.docker.internal:8090}
      USAGE_WEB_INTERNAL_ORIGIN: ${USAGE_WEB_INTERNAL_ORIGIN:-http://host.docker.internal:3001}
      BILLING_WEB_INTERNAL_ORIGIN: ${BILLING_WEB_INTERNAL_ORIGIN:-http://host.docker.internal:3003}
      TEAM_WEB_INTERNAL_ORIGIN: ${TEAM_WEB_INTERNAL_ORIGIN:-http://host.docker.internal:3002}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${IDENTITY_WEB_PORT:-3000}:3000"

  usage-web:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/usage-service/web/Dockerfile
      args:
        NEXT_PUBLIC_IDENTITY_WEB_ORIGIN: ${NEXT_PUBLIC_IDENTITY_WEB_ORIGIN:-http://localhost:${IDENTITY_WEB_PORT:-3000}}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-/dashboard}
    depends_on:
      - api-gateway-service
    environment:
      API_GATEWAY_URL: http://api-gateway-service:8080
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://host.docker.internal:8090}
      GATEWAY_DEV_MODE: ${GATEWAY_DEV_MODE:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${USAGE_WEB_PORT:-3001}:3000"

  usage-web-mfe:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/usage-service/web-mfe/Dockerfile
    depends_on:
      - usage-web
    expose:
      - "3000"

  # billing-web 은 usage-web 과 동일 DashboardShell; 빌드 시 NEXT_PUBLIC_IDENTITY_WEB_ORIGIN 등은 루트 .env 와 맞출 것.
  billing-web:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/billing-service/web/Dockerfile
      args:
        NEXT_PUBLIC_IDENTITY_WEB_ORIGIN: ${NEXT_PUBLIC_IDENTITY_WEB_ORIGIN:-http://localhost:${IDENTITY_WEB_PORT:-3000}}
    depends_on:
      - api-gateway-service
    environment:
      API_GATEWAY_URL: http://api-gateway-service:8080
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://host.docker.internal:8090}
      GATEWAY_DEV_MODE: ${GATEWAY_DEV_MODE:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BILLING_WEB_PORT:-3003}:3000"

  notification-web:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/notification-service/web/Dockerfile
      network: host
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_NOTIFICATION_BASE_PATH:-/notifications}
    depends_on:
      - api-gateway-service
      - notification-service
    environment:
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://host.docker.internal:8090}
      NOTIFICATION_SERVICE_URL: ${WEB_NOTIFICATION_SERVICE_URL:-http://notification-service:8096}
      NOTIFICATION_INTERNAL_SECRET: ${NOTIFICATION_INTERNAL_SECRET:-}
      NEXT_PUBLIC_NOTIFICATION_POLL_MS: ${NEXT_PUBLIC_NOTIFICATION_POLL_MS:-10000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${NOTIFICATION_WEB_PORT:-3004}:3000"

  team-service:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/team-service/Dockerfile
    environment:
      TEAM_POSTGRES_HOST: postgres-team
      TEAM_POSTGRES_PORT: 5432
      TEAM_POSTGRES_DB: ${TEAM_POSTGRES_DB:-team_db}
      TEAM_POSTGRES_USER: ${TEAM_POSTGRES_USER:-team_app}
      TEAM_POSTGRES_PASSWORD: ${TEAM_POSTGRES_PASSWORD:-team_app}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://host.docker.internal:8090}
      SECURITY_JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-to-at-least-32-bytes}
      TEAM_API_KEY_ENCRYPTION_SECRET: ${TEAM_API_KEY_ENCRYPTION_SECRET:-change-this-team-api-key-encryption-secret-min-32-chars}
      TEAM_SERVICE_PORT: 8093
    depends_on:
      postgres-team:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Published host port: TEAM_SERVICE_HOST_PORT (not TEAM_SERVICE_PORT — see .env.example).
    ports:
      - "${TEAM_SERVICE_HOST_PORT:-8093}:8093"

  team-web:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/team-service/web/Dockerfile
    depends_on:
      - team-service
    environment:
      TEAM_SERVICE_URL: ${WEB_TEAM_SERVICE_URL:-http://team-service:8093}
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://host.docker.internal:8090}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${TEAM_WEB_PORT:-3002}:3000"

  team-web-mfe:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/team-service/web-mfe/Dockerfile
    depends_on:
      - team-web
    expose:
      - "3000"

  web-edge:
    profiles:
      - web
    image: nginx:1.27-alpine
    depends_on:
      - identity-web
      - usage-web
      - billing-web
      - team-web
      - notification-web
      - api-gateway-service
    ports:
      - "${WEB_EDGE_PORT:-8888}:80"
    volumes:
      - ./docker/web-edge/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  postgres_team_data:
  postgres_usage_data:
  postgres_billing_data:
  postgres_notification_data:

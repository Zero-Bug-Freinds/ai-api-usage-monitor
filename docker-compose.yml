# Local infrastructure for the monorepo (see docs/architecture.md §10, §10.1 패턴 B, §10.2 단일 도메인).
# Copy `.env.example` to `.env` and set secrets locally; do not commit `.env`.
#
# GATEWAY_SHARED_SECRET — api-gateway-service·proxy-service 환경에 `${GATEWAY_SHARED_SECRET:-}` 가 넘어간다.
#   .env 에서 변수를 빼면 Compose 가 빈 문자열을 주입해 Spring 이 application.yml 기본값을 못 쓸 수 있다.
#   비어 있지 않은 값으로 맞추거나(루트 .env.example 로컬 전용 문자열) 줄 자체를 두지 않는다.
#   게이트웨이·proxy·usage-service 의 shared-secret 은 동일해야 한다 — docs/contracts/gateway-proxy.md §5.
#
# [Java] 앱 이미지: proxy·api-gateway 는 각 디렉터리에서 ./gradlew bootJar 후 Dockerfile COPY.
# identity·usage 백엔드는 패턴 B Dockerfile 이 Gradle 을 이미지 안에서 실행(사전 JAR 불필요).
#   usage 백엔드: 저장소 루트에서 docker build -f services/usage-service/Dockerfile -t usage-service:local .
#
# identity-service, usage-service, billing-service Spring 앱은
# 루트 Compose 에서 컨테이너 네트워크(service DNS)로 함께 기동한다.
#
# [Next] 빌드: 저장소 루트에서 pnpm install 후 `pnpm build:web` 또는 각 web 에서 build.
#   Docker 이미지: build context 는 루트(.), dockerfile 은 services/<svc>/web/Dockerfile (workspace `packages/ui`).
#   공통 pnpm install 레이어를 재사용하려면 먼저
#   `docker build -f docker/web-node-deps.Dockerfile -t ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local} .`
#   후 `docker compose --profile web up -d --build` 를 실행한다.
# [Node backend] notification-service 공통 install 레이어를 재사용하려면 먼저
#   `docker build -f docker/backend-node-deps.Dockerfile -t ${BACKEND_NODE_DEPS_IMAGE:-backend-node-deps:local} .`
#   후 `docker compose --profile web up -d --build notification-service` 를 실행한다.
#
# Next.js — 선택: docker compose --profile web up (identity-web + usage-web + billing-web + web-edge)
#   게이트웨이는 컨테이너 네트워크(api-gateway-service:8080)로 연결(API_GATEWAY_URL).
#   Identity BFF는 기본적으로 호스트의 identity-service 를 host.docker.internal 로 향함(WEB_IDENTITY_SERVICE_URL).
#   단일 도메인: web-edge(Nginx, docker/web-edge/nginx.conf) → 기본 ${WEB_EDGE_PORT:-8888}
#     /dashboard → 308 /dashboard/; 접두 /dashboard/ 만 usage-web(/dashboard2 는 제외); /api/v1 → 308 /api/v1/; 접두 /api/v1/ 만 api-gateway(버퍼링 끔·긴 timeout); 그 외 → identity-web.
#
# Docker 빌드 캐시: 로컬 Compose에는 registry cache_from/cache_to 를 두지 않는다(팀원 GHCR 로그인 불필요).
# 각 Dockerfile 의 RUN --mount=type=cache(pnpm store, Gradle, .next/cache 등)로 로컬 빌드 속도를 유지한다.
# CI(GitHub Actions)에서는 .github/workflows/ci.yml 및 docs/CI.md 의 docker/build-push-action + type=gha 패턴을 사용한다.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-team:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      TEAM_POSTGRES_DB: ${TEAM_POSTGRES_DB:-team_db}
      TEAM_POSTGRES_USER: ${TEAM_POSTGRES_USER:-team_app}
      TEAM_POSTGRES_PASSWORD: ${TEAM_POSTGRES_PASSWORD:-team_app}
    ports:
      - "${TEAM_POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_team_data:/var/lib/postgresql/data
      - ./docker/postgres/init/postgres-team-init.sql:/docker-entrypoint-initdb.d/postgres-team-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-usage:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # superuser credentials used by docker/postgres/init/02-create-usage-db.sh
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      # usage-service only; init script 02-create-usage-db.sh (first boot / empty volume only)
      USAGE_POSTGRES_DB: ${USAGE_POSTGRES_DB:-usage_db}
      USAGE_POSTGRES_USER: ${USAGE_POSTGRES_USER:-usage_app}
      USAGE_POSTGRES_PASSWORD: ${USAGE_POSTGRES_PASSWORD:-usage_app}
    ports:
      - "5433:5432"
    volumes:
      - postgres_usage_data:/var/lib/postgresql/data
      - ./docker/postgres/init/02-create-usage-db.sh:/docker-entrypoint-initdb.d/02-create-usage-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-billing:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      BILLING_POSTGRES_DB: ${BILLING_POSTGRES_DB:-billing_db}
      BILLING_POSTGRES_USER: ${BILLING_POSTGRES_USER:-billing_app}
      BILLING_POSTGRES_PASSWORD: ${BILLING_POSTGRES_PASSWORD:-billing_app}
    ports:
      - "${BILLING_POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_billing_data:/var/lib/postgresql/data
      - ./docker/postgres/init/03-create-billing-db.sh:/docker-entrypoint-initdb.d/03-create-billing-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres-notification:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      NOTIFICATION_POSTGRES_DB: ${NOTIFICATION_POSTGRES_DB:-notification_db}
      NOTIFICATION_POSTGRES_USER: ${NOTIFICATION_POSTGRES_USER:-notification_app}
      NOTIFICATION_POSTGRES_PASSWORD: ${NOTIFICATION_POSTGRES_PASSWORD:-notification_app}
    ports:
      - "${NOTIFICATION_POSTGRES_PORT:-5436}:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
      - ./docker/postgres/init/04-create-notification-db.sh:/docker-entrypoint-initdb.d/04-create-notification-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      # AMQP broker port (app-to-broker messaging)
      - "${RABBITMQ_PORT:-5672}:5672"
      # RabbitMQ Management UI (optional admin dashboard)
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      # RabbitMQ 플러그인/메시지스토어 복구 시간이 30s를 초과할 수 있어 startup grace를 늘린다.
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  notification-service:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
      args:
        BACKEND_NODE_DEPS_IMAGE: ${BACKEND_NODE_DEPS_IMAGE:-backend-node-deps:local}
    depends_on:
      postgres-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${NOTIFICATION_POSTGRES_USER:-notification_app}:${NOTIFICATION_POSTGRES_PASSWORD:-notification_app}@postgres-notification:5432/${NOTIFICATION_POSTGRES_DB:-notification_db}
      PORT: 8096
      NOTIFICATION_INTERNAL_SECRET: ${NOTIFICATION_INTERNAL_SECRET:-}
      TEAM_SERVICE_INTERNAL_BASE_URL: ${TEAM_SERVICE_INTERNAL_BASE_URL:-http://team-service:8093}
      # team-service TeamDomainEventPublisher: exchange team.events, routing key team-member-added (application.properties)
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      TEAM_EVENTS_CONSUMER_ENABLED: ${TEAM_EVENTS_CONSUMER_ENABLED:-true}
      TEAM_EVENTS_QUEUE_NAME: ${TEAM_EVENTS_QUEUE_NAME:-notification.team.events}
      TEAM_EVENTS_ASSERT_TOPOLOGY: ${TEAM_EVENTS_ASSERT_TOPOLOGY:-true}
      TEAM_EVENTS_EXCHANGE_NAME: ${TEAM_EVENTS_EXCHANGE_NAME:-team.events}
      TEAM_EVENTS_BINDING_KEYS: ${TEAM_EVENTS_BINDING_KEYS:-team-member-added}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8096}:8096"

  identity-service:
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      JWT_SECRET: ${GATEWAY_JWT_SECRET:-change-this-secret-key-to-at-least-32-bytes}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${IDENTITY_SERVICE_PORT:-8090}:8080"

  usage-service:
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/usage-service/Dockerfile
    depends_on:
      postgres-usage:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      USAGE_POSTGRES_HOST: postgres-usage
      USAGE_POSTGRES_PORT: 5432
      USAGE_POSTGRES_DB: ${USAGE_POSTGRES_DB:-usage_db}
      USAGE_POSTGRES_USER: ${USAGE_POSTGRES_USER:-usage_app}
      USAGE_POSTGRES_PASSWORD: ${USAGE_POSTGRES_PASSWORD:-usage_app}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-}
      USAGE_SERVICE_PORT: 8092
    ports:
      - "${USAGE_SERVICE_PORT:-8092}:8092"

  billing-service:
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/billing-service/Dockerfile
    depends_on:
      postgres-billing:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      BILLING_POSTGRES_HOST: postgres-billing
      BILLING_POSTGRES_PORT: 5432
      BILLING_POSTGRES_DB: ${BILLING_POSTGRES_DB:-billing_db}
      BILLING_POSTGRES_USER: ${BILLING_POSTGRES_USER:-billing_app}
      BILLING_POSTGRES_PASSWORD: ${BILLING_POSTGRES_PASSWORD:-billing_app}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      BILLING_SERVICE_PORT: 8095
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-}
      BILLING_IDENTITY_ENABLED: ${BILLING_IDENTITY_ENABLED:-false}
      BILLING_IDENTITY_BASE_URL: ${BILLING_IDENTITY_BASE_URL:-http://identity-service:8080}
      BILLING_IDENTITY_BUDGET_PATH: "${BILLING_IDENTITY_BUDGET_PATH:-/api/identity/v1/users/budget?email={userId}}"
    ports:
      - "${BILLING_SERVICE_PORT:-8095}:8095"

  proxy-service:
    restart: unless-stopped
    build:
      context: ./services/proxy-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PROXY_KEY_SERVICE_BASE_URL: ${PROXY_KEY_SERVICE_BASE_URL:-http://identity-service:8080}
      PROXY_OPENAI_TEST_API_KEY: ${PROXY_OPENAI_TEST_API_KEY:-}
      PROXY_GOOGLE_TEST_API_KEY: ${PROXY_GOOGLE_TEST_API_KEY:-}
      PROXY_MOCK_KEY_FALLBACK: ${PROXY_MOCK_KEY_FALLBACK:-}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PROXY_SERVICE_PORT:-8081}:8081"

  api-gateway-service:
    restart: unless-stopped
    build:
      context: ./services/api-gateway-service
    depends_on:
      proxy-service:
        condition: service_started
      identity-service:
        condition: service_started
      usage-service:
        condition: service_started
      billing-service:
        condition: service_started
    environment:
      GATEWAY_PROXY_URI: http://proxy-service:8081
      GATEWAY_IDENTITY_URI: ${GATEWAY_IDENTITY_URI:-http://identity-service:8080}
      GATEWAY_USAGE_URI: ${GATEWAY_USAGE_URI:-http://usage-service:8092}
      GATEWAY_TEAM_URI: ${GATEWAY_TEAM_URI:-http://team-service:8093}
      GATEWAY_NOTIFICATION_URI: ${GATEWAY_NOTIFICATION_URI:-http://notification-service:8096}
      GATEWAY_BILLING_URI: ${GATEWAY_BILLING_URI:-http://billing-service:8095}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-}
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-}
      GATEWAY_DEV_MODE: ${GATEWAY_DEV_MODE:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"

  identity-web:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/identity-service/web/Dockerfile
      args:
        WEB_NODE_DEPS_IMAGE: ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local}
        NEXT_PUBLIC_USAGE_WEB_ORIGIN: ${NEXT_PUBLIC_USAGE_WEB_ORIGIN:-http://usage-web:3000}
    depends_on:
      - api-gateway-service
    environment:
      # identity-web BFF must call gateway so that gateway injects X-User-Id/X-Team-Id.
      GATEWAY_URL: ${WEB_GATEWAY_URL:-http://api-gateway-service:8080}
      WEB_GATEWAY_URL: ${WEB_GATEWAY_URL:-http://api-gateway-service:8080}
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://identity-service:8080}
      USAGE_WEB_INTERNAL_ORIGIN: ${USAGE_WEB_INTERNAL_ORIGIN:-http://host.docker.internal:3001}
      BILLING_WEB_INTERNAL_ORIGIN: ${BILLING_WEB_INTERNAL_ORIGIN:-http://host.docker.internal:3003}
      TEAM_WEB_INTERNAL_ORIGIN: ${TEAM_WEB_INTERNAL_ORIGIN:-http://team-web:3000}
      WEB_HOST_INTERNAL_ORIGIN: ${WEB_HOST_INTERNAL_ORIGIN:-http://web-host:3000}
      AGENT_WEB_INTERNAL_ORIGIN: ${AGENT_WEB_INTERNAL_ORIGIN:-http://agent-web:3000}
      AI_AGENT_WEB_INTERNAL_ORIGIN: ${AI_AGENT_WEB_INTERNAL_ORIGIN:-http://agent-web:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${IDENTITY_WEB_PORT:-3000}:3000"

  agent-web:
    profiles:
      - web
    build:
      context: .
      dockerfile: services/agent-service/web/Dockerfile
      args:
        WEB_NODE_DEPS_IMAGE: ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local}
    depends_on:
      - identity-web
    environment:
      NEXT_PUBLIC_IDENTITY_WEB_ORIGIN: ${NEXT_PUBLIC_IDENTITY_WEB_ORIGIN:-http://localhost:${IDENTITY_WEB_PORT:-3000}}
      AI_AGENT_SERVICE_INTERNAL_ORIGIN: ${AI_AGENT_SERVICE_INTERNAL_ORIGIN:-http://host.docker.internal:8096}
      AI_AGENT_FALLBACK_USER_ID: ${AI_AGENT_FALLBACK_USER_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${AGENT_WEB_PORT:-3005}:3000"

  usage-web:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/usage-service/web/Dockerfile
      args:
        WEB_NODE_DEPS_IMAGE: ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local}
        NEXT_PUBLIC_IDENTITY_WEB_ORIGIN: ${NEXT_PUBLIC_IDENTITY_WEB_ORIGIN:-http://localhost:${IDENTITY_WEB_PORT:-3000}}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-/dashboard}
    depends_on:
      - api-gateway-service
    environment:
      API_GATEWAY_URL: http://api-gateway-service:8080
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://identity-service:8080}
      GATEWAY_DEV_MODE: ${GATEWAY_DEV_MODE:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${USAGE_WEB_PORT:-3001}:3000"

  usage-web-mfe:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/usage-service/web-mfe/Dockerfile
      args:
        WEB_NODE_DEPS_IMAGE: ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local}
    depends_on:
      - usage-web
    expose:
      - "3000"

  # billing-web 은 usage-web 과 동일 DashboardShell; 빌드 시 NEXT_PUBLIC_IDENTITY_WEB_ORIGIN 등은 루트 .env 와 맞출 것.
  billing-web:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/billing-service/web/Dockerfile
      args:
        WEB_NODE_DEPS_IMAGE: ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local}
        NEXT_PUBLIC_IDENTITY_WEB_ORIGIN: ${NEXT_PUBLIC_IDENTITY_WEB_ORIGIN:-http://localhost:${IDENTITY_WEB_PORT:-3000}}
    depends_on:
      - api-gateway-service
      - identity-web
    environment:
      API_GATEWAY_URL: http://api-gateway-service:8080
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://identity-service:8080}
      GATEWAY_DEV_MODE: ${GATEWAY_DEV_MODE:-true}
      # billing-web 서버 라우트가 컨테이너 내부에서 /api/team/v1/**(identity-web BFF)로 호출할 때 사용할 오리진.
      # Compose 네트워크에서는 서비스 DNS(identity-web:3000)가 가장 안정적이다. 호스트 전용 구성이면 BILLING_TEAM_BFF_BASE_URL 로 덮어쓴다.
      BILLING_TEAM_BFF_BASE_URL: ${BILLING_TEAM_BFF_BASE_URL:-http://identity-web:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BILLING_WEB_PORT:-3003}:3000"

  notification-web:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/notification-service/web/Dockerfile
      network: host
      args:
        WEB_NODE_DEPS_IMAGE: ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_NOTIFICATION_BASE_PATH:-/notifications}
    depends_on:
      - api-gateway-service
      - notification-service
    environment:
      NOTIFICATION_HTTP_UPSTREAM: ${NOTIFICATION_HTTP_UPSTREAM:-direct}
      API_GATEWAY_URL: ${WEB_GATEWAY_URL:-http://api-gateway-service:8080}
      NOTIFICATION_SERVICE_URL: ${WEB_NOTIFICATION_SERVICE_URL:-http://notification-service:8096/api}
      NOTIFICATION_INTERNAL_SECRET: ${NOTIFICATION_INTERNAL_SECRET:-}
      NEXT_PUBLIC_NOTIFICATION_POLL_MS: ${NEXT_PUBLIC_NOTIFICATION_POLL_MS:-10000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${NOTIFICATION_WEB_PORT:-3004}:3000"

  team-service:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/team-service/Dockerfile
    environment:
      TEAM_POSTGRES_HOST: postgres-team
      TEAM_POSTGRES_PORT: 5432
      TEAM_POSTGRES_DB: ${TEAM_POSTGRES_DB:-team_db}
      TEAM_POSTGRES_USER: ${TEAM_POSTGRES_USER:-team_app}
      TEAM_POSTGRES_PASSWORD: ${TEAM_POSTGRES_PASSWORD:-team_app}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://identity-service:8080}
      SECURITY_JWT_SECRET: ${JWT_SECRET:-change-this-secret-key-to-at-least-32-bytes}
      TEAM_API_KEY_ENCRYPTION_SECRET: ${TEAM_API_KEY_ENCRYPTION_SECRET:-change-this-team-api-key-encryption-secret-min-32-chars}
      TEAM_SERVICE_PORT: 8093
    depends_on:
      postgres-team:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Published host port: TEAM_SERVICE_HOST_PORT (not TEAM_SERVICE_PORT — see .env.example).
    ports:
      - "${TEAM_SERVICE_HOST_PORT:-8093}:8093"

  web-host:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        WEB_NODE_DEPS_IMAGE: ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local}
        NEXT_PUBLIC_MFE_TEAM_REMOTE_URL: ${NEXT_PUBLIC_MFE_TEAM_REMOTE_URL:-http://localhost:8888/mfe/team}
        NEXT_PUBLIC_MFE_USAGE_REMOTE_URL: ${NEXT_PUBLIC_MFE_USAGE_REMOTE_URL:-http://localhost:8888/mfe/usage}
    depends_on:
      - team-service
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PRIVATE_LOCAL_WEBPACK: "true"
      NEXT_PUBLIC_IDENTITY_WEB_ORIGIN: ${NEXT_PUBLIC_IDENTITY_WEB_ORIGIN:-http://localhost:${IDENTITY_WEB_PORT:-3000}}
      NEXT_PUBLIC_MFE_TEAM_REMOTE_URL: ${NEXT_PUBLIC_MFE_TEAM_REMOTE_URL:-http://localhost:8888/mfe/team}
      NEXT_PUBLIC_MFE_USAGE_REMOTE_URL: ${NEXT_PUBLIC_MFE_USAGE_REMOTE_URL:-http://localhost:8888/mfe/usage}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEB_HOST_PORT:-3002}:3000"

  team-web:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/team-service/web/Dockerfile
      args:
        WEB_NODE_DEPS_IMAGE: ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local}
    depends_on:
      - team-service
    environment:
      GATEWAY_URL: ${WEB_GATEWAY_URL:-http://api-gateway-service:8080}
      TEAM_SERVICE_URL: ${WEB_TEAM_SERVICE_URL:-http://team-service:8093}
      IDENTITY_SERVICE_URL: ${WEB_IDENTITY_SERVICE_URL:-http://identity-service:8080}
      NEXT_PUBLIC_TEAM_CONSOLE_URL: ${NEXT_PUBLIC_TEAM_CONSOLE_URL:-http://localhost:${WEB_EDGE_PORT:-8888}/teams}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${TEAM_WEB_PORT:-3022}:3000"

  team-web-mfe:
    profiles:
      - web
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/team-service/web-mfe/Dockerfile
      args:
        WEB_NODE_DEPS_IMAGE: ${WEB_NODE_DEPS_IMAGE:-web-node-deps:local}
    depends_on:
      - team-web
    expose:
      - "3000"

  web-edge:
    profiles:
      - web
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - identity-web
      - usage-web
      - billing-web
      - team-web
      - web-host
      - team-web-mfe
      - usage-web-mfe
      - notification-web
      - api-gateway-service
    environment:
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-}
    command: >
      /bin/sh -c "envsubst '$$GATEWAY_SHARED_SECRET'
      < /etc/nginx/nginx.conf.template
      > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    ports:
      - "${WEB_EDGE_PORT:-8888}:80"
    volumes:
      - ./docker/web-edge/nginx.conf.template:/etc/nginx/nginx.conf.template:ro

volumes:
  postgres_data:
  postgres_team_data:
  postgres_usage_data:
  postgres_billing_data:
  postgres_notification_data:

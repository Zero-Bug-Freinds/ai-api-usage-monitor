# 단일 도메인 엣지 — compose 의 web-edge 서비스가 로드한다.
# /dashboard* → usage-web(Next basePath=/dashboard), /api/v1/* → api-gateway, 그 외 → identity-web

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 50m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  upstream identity_web {
    server identity-web:3000;
  }

  upstream usage_web {
    server usage-web:3000;
  }

  upstream api_gateway {
    server api-gateway-service:8080;
  }

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location ^~ /dashboard {
      proxy_pass http://usage_web;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location ^~ /api/v1/ {
      proxy_pass http://api_gateway;
      proxy_set_header Connection "";
    }

    location / {
      proxy_pass http://identity_web;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}

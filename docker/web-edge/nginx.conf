# 단일 도메인 엣지 — compose 의 web-edge 서비스가 로드한다.
# Usage Next: basePath=/dashboard → 브라우저는 /dashboard 및 /dashboard/* 만 Usage 로 보낸다.
#   location 은 /dashboard/ 접두만 매칭(/dashboard2 같은 오탐 방지). /dashboard 는 /dashboard/ 로 고정 리다이렉트.
# Billing Next: basePath=/billing → /billing 및 /billing/* 만 billing-web 으로 보낸다. /billing 는 /billing/ 로 308.
# /api/v1/* → api-gateway(스트리밍·장시간 응답 대비 버퍼링 끔), 그 외 → identity-web

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 50m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  upstream identity_web {
    server identity-web:3000;
  }

  upstream usage_web {
    server usage-web:3000;
  }

  upstream team_web {
    server team-web:3000;
  }

  upstream billing_web {
    server billing-web:3000;
  }

  upstream api_gateway {
    server api-gateway-service:8080;
  }

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /dashboard {
      return 308 /dashboard/;
    }

    location ^~ /dashboard/ {
      proxy_pass http://usage_web;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location = /billing {
      return 308 /billing/;
    }

    location ^~ /billing/ {
      proxy_pass http://billing_web;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location = /teams {
      return 308 /teams/;
    }

    location ^~ /teams/ {
      proxy_pass http://team_web;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location = /api/v1 {
      return 308 /api/v1/;
    }

    location ^~ /api/v1/ {
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location / {
      proxy_pass http://identity_web;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}

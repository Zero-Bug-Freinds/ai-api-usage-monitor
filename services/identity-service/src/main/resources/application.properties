spring.application.name=identity-service

# PostgreSQL — 루트 .env.example 의 POSTGRES_* 와 동일한 변수명 (로컬/Compose 에서 주입)
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:app}
spring.datasource.username=${POSTGRES_USER:app}
spring.datasource.password=${POSTGRES_PASSWORD:app}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# User 엔티티는 @Column 으로 snake_case 명시; 이후 엔티티 기본 규칙용
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# 외부 API 키 저장용 AES 키 유도 문자열(운영에서는 IDENTITY_API_KEY_ENCRYPTION_SECRET 등으로 충분히 긴 값 권장)
identity.api-key.encryption.secret=${IDENTITY_API_KEY_ENCRYPTION_SECRET:change-this-external-api-key-encryption-secret-min-32-chars}

# 비밀번호 재설정: 메일의 링크에 사용할 공개 웹 베이스 URL (슬래시 없이 끝나도 됨)
identity.passwordReset.webBaseUrl=${IDENTITY_WEB_PUBLIC_BASE_URL:${IDENTITY_PASSWORDRESET_WEBBASEURL:http://localhost:3000}}
identity.passwordReset.tokenValidityHours=${IDENTITY_PASSWORD_RESET_TOKEN_VALIDITY_HOURS:1}
identity.passwordReset.mailFrom=${IDENTITY_PASSWORD_RESET_MAIL_FROM:${IDENTITY_PASSWORDRESET_MAILFROM:noreply@localhost}}

# SMTP (선택). 미설정 시 재설정 링크는 로그(INFO)로만 출력된다.
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# RabbitMQ — usage/billing/team 과 동일한 변수명 (루트 .env)
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:${RABBITMQ_USER:guest}}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:guest}}

# 회원 탈퇴 시 다른 서비스가 DB 정리를 하도록 발행 (구독 측에서 queue 바인딩)
identity.account-deletion-event.exchange=${IDENTITY_ACCOUNT_DELETION_EVENT_EXCHANGE:identity.events}
identity.account-deletion-event.routing-key=${IDENTITY_ACCOUNT_DELETION_EVENT_ROUTING_KEY:identity.user.account-deletion-requested}

# 외부 API 키 상태 동기화 이벤트(usage-service 구독 대상)
identity.external-api-key-event.exchange=${IDENTITY_EXTERNAL_API_KEY_EVENT_EXCHANGE:identity.events}
identity.external-api-key-event.routing-key=${IDENTITY_EXTERNAL_API_KEY_EVENT_ROUTING_KEY:identity.external-api-key.status-changed}

# 다른 서비스가 삭제 완료 시 identity 로 보내는 ACK (이 큐를 리스닝)
identity.account-deletion-ack.queue=${IDENTITY_ACCOUNT_DELETION_ACK_QUEUE:identity.account-deletion.ack.queue}
identity.account-deletion-ack.routing-key=${IDENTITY_ACCOUNT_DELETION_ACK_ROUTING_KEY:identity.user.account-deletion-ack}

# team-service 내부 멤버십 검증 API 호출 베이스 URL
identity.team-service.internal-base-url=${IDENTITY_TEAM_SERVICE_INTERNAL_BASE_URL:${TEAM_SERVICE_INTERNAL_URL:http://team-service:8093}}

# team-service TEAM_MEMBER_REMOVED 이벤트 구독(수신 후 refresh token 무효화)
identity.team-event.exchange=${IDENTITY_TEAM_EVENT_EXCHANGE:team.events}
identity.team-member-removed.routing-key=${IDENTITY_TEAM_MEMBER_REMOVED_ROUTING_KEY:team-member-added}
identity.team-member-removed.queue=${IDENTITY_TEAM_MEMBER_REMOVED_QUEUE:identity.team.member-removed.queue}

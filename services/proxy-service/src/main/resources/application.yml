server:
  port: 8081

spring:
  application:
    name: proxy-service
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

management:
  endpoints:
    web:
      exposure:
        include: health,info

proxy:
  providers:
    openai:
      base-url: https://api.openai.com
    anthropic:
      base-url: https://api.anthropic.com
    google:
      base-url: https://generativelanguage.googleapis.com
  key-service:
    base-url: http://localhost:8090
    internal-token: ""
    mock-key-openai: ${PROXY_OPENAI_TEST_API_KEY:}
    mock-key-google: ${PROXY_GOOGLE_TEST_API_KEY:}
    mock-key: ${PROXY_MOCK_KEY_FALLBACK:}
    cache-ttl: PT5M
  rabbit:
    usage-exchange: usage.events
    usage-routing-key: usage.recorded
  gateway:
    # When true, require header X-Gateway-Auth (see docs/contracts/gateway-proxy.md). Same value as Gateway service.
    require-auth: false
    shared-secret: ${GATEWAY_SHARED_SECRET:}

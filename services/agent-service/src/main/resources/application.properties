spring.application.name=agent-service
server.port=${AI_AGENT_SERVICE_PORT:8096}
ai-agent.gemini.api-key=${AI_AGENT_GEMINI_API_KEY:${PROXY_GOOGLE_TEST_API_KEY:${GOOGLE_API_KEY:}}}
ai-agent.gemini.model=${AI_AGENT_GEMINI_MODEL:gemini-2.5-flash}
ai-agent.gemini.base-url=${AI_AGENT_GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:${RABBITMQ_USER:guest}}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:guest}}
ai-agent.rabbit.identity-api-key.enabled=${AI_AGENT_RABBIT_IDENTITY_API_KEY_ENABLED:true}
ai-agent.rabbit.identity-api-key.exchange=${AI_AGENT_RABBIT_IDENTITY_API_KEY_EXCHANGE:identity.events}
ai-agent.rabbit.identity-api-key.routing-key=${AI_AGENT_RABBIT_IDENTITY_API_KEY_ROUTING_KEY:identity.#}
ai-agent.rabbit.identity-api-key.queue=${AI_AGENT_RABBIT_IDENTITY_API_KEY_QUEUE:ai-agent.identity.external-api-key.queue}
ai-agent.rabbit.team-api-key.enabled=${AI_AGENT_RABBIT_TEAM_API_KEY_ENABLED:true}
ai-agent.rabbit.team-api-key.exchange=${AI_AGENT_RABBIT_TEAM_API_KEY_EXCHANGE:team.api-key.exchange}
ai-agent.rabbit.team-api-key.routing-key=${AI_AGENT_RABBIT_TEAM_API_KEY_ROUTING_KEY:team.api-key.status.changed}
ai-agent.rabbit.team-api-key.queue=${AI_AGENT_RABBIT_TEAM_API_KEY_QUEUE:ai-agent.team.api-key.status-changed.queue}
ai-agent.rabbit.billing-cost.enabled=${AI_AGENT_RABBIT_BILLING_COST_ENABLED:true}
ai-agent.rabbit.billing-cost.exchange=${AI_AGENT_RABBIT_BILLING_COST_EXCHANGE:billing.events}
ai-agent.rabbit.billing-cost.routing-key=${AI_AGENT_RABBIT_BILLING_COST_ROUTING_KEY:usage.cost.finalized}
ai-agent.rabbit.billing-cost.queue=${AI_AGENT_RABBIT_BILLING_COST_QUEUE:ai-agent.billing.cost-finalized.queue}
ai-agent.rabbit.billing-correction.enabled=${AI_AGENT_RABBIT_BILLING_CORRECTION_ENABLED:true}
ai-agent.rabbit.billing-correction.exchange=${AI_AGENT_RABBIT_BILLING_CORRECTION_EXCHANGE:billing.events}
ai-agent.rabbit.billing-correction.routing-key=${AI_AGENT_RABBIT_BILLING_CORRECTION_ROUTING_KEY:billing.cost.corrected}
ai-agent.rabbit.billing-correction.queue=${AI_AGENT_RABBIT_BILLING_CORRECTION_QUEUE:ai-agent.billing.cost-corrected.queue}
ai-agent.rabbit.usage-prediction.enabled=${AI_AGENT_RABBIT_USAGE_PREDICTION_ENABLED:true}
ai-agent.rabbit.usage-prediction.exchange=${AI_AGENT_RABBIT_USAGE_PREDICTION_EXCHANGE:usage.events}
ai-agent.rabbit.usage-prediction.routing-key=${AI_AGENT_RABBIT_USAGE_PREDICTION_ROUTING_KEY:usage.prediction.signals}
ai-agent.rabbit.usage-prediction.queue=${AI_AGENT_RABBIT_USAGE_PREDICTION_QUEUE:agent-service.usage-prediction-signals.queue}
ai-agent.rabbit.daily-cumulative-tokens.enabled=${AI_AGENT_RABBIT_DAILY_CUMULATIVE_TOKENS_ENABLED:true}
ai-agent.rabbit.daily-cumulative-tokens.exchange=${AI_AGENT_RABBIT_DAILY_CUMULATIVE_TOKENS_EXCHANGE:usage.events}
ai-agent.rabbit.daily-cumulative-tokens.routing-key=${AI_AGENT_RABBIT_DAILY_CUMULATIVE_TOKENS_ROUTING_KEY:usage.daily.cumulative.tokens}
ai-agent.rabbit.daily-cumulative-tokens.queue=${AI_AGENT_RABBIT_DAILY_CUMULATIVE_TOKENS_QUEUE:agent-service.usage-daily-cumulative-tokens.queue}
ai-agent.rabbit.usage-recorded.enabled=${AI_AGENT_RABBIT_USAGE_RECORDED_ENABLED:true}
ai-agent.rabbit.usage-recorded.exchange=${AI_AGENT_RABBIT_USAGE_RECORDED_EXCHANGE:usage.events}
ai-agent.rabbit.usage-recorded.routing-key=${AI_AGENT_RABBIT_USAGE_RECORDED_ROUTING_KEY:usage.recorded}
ai-agent.rabbit.usage-recorded.queue=${AI_AGENT_RABBIT_USAGE_RECORDED_QUEUE:agent-service.usage-recorded.queue}
spring.data.redis.host=${SPRING_REDIS_HOST:${REDIS_HOST:redis}}
spring.data.redis.port=${SPRING_REDIS_PORT:${REDIS_PORT:6379}}
ai-agent.billing-reconcile.enabled=${AI_AGENT_BILLING_RECONCILE_ENABLED:true}
ai-agent.billing-reconcile.base-url=${AI_AGENT_BILLING_BASE_URL:http://billing-service:8095}
ai-agent.billing-reconcile.gateway-shared-secret=${GATEWAY_SHARED_SECRET:local-dev-gateway-shared-secret-do-not-use-in-prod}
ai-agent.billing-reconcile.initial-delay-ms=${AI_AGENT_BILLING_RECONCILE_INITIAL_DELAY_MS:60000}
ai-agent.billing-reconcile.fixed-delay-ms=${AI_AGENT_BILLING_RECONCILE_FIXED_DELAY_MS:180000}
ai-agent.recommendation.catalog.url=${AI_AGENT_RECOMMENDATION_CATALOG_URL:}
ai-agent.recommendation.catalog.refresh-ms=${AI_AGENT_RECOMMENDATION_CATALOG_REFRESH_MS:300000}
ai-agent.recommendation.catalog.request-timeout-ms=${AI_AGENT_RECOMMENDATION_CATALOG_REQUEST_TIMEOUT_MS:5000}

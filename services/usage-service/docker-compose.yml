# 패턴 B — usage-service 백엔드(JAR)와 프론트(./web) 이미지 빌드.
# 런타임 네트워크는 루트 docker-compose.yml 을 따른다.
# 예: docker compose -f docker-compose.yml build backend frontend
name: usage-service-stack
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: usage-service:local
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: usage-service-web:local

server:
  port: ${USAGE_SERVICE_PORT:8092}

spring:
  application:
    name: usage-service
  datasource:
    url: jdbc:postgresql://${USAGE_POSTGRES_HOST:localhost}:${USAGE_POSTGRES_PORT:5433}/${USAGE_POSTGRES_DB:usage_db}
    username: ${USAGE_POSTGRES_USER:usage_app}
    password: ${USAGE_POSTGRES_PASSWORD:usage_app}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:${RABBITMQ_USER:guest}}
    password: ${SPRING_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:guest}}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info

usage:
  rabbit:
    exchange: usage.events
    routing-key: usage.recorded
    queue: usage-service.queue
    identity-api-key:
      enabled: ${USAGE_RABBIT_IDENTITY_API_KEY_ENABLED:true}
      exchange: ${USAGE_RABBIT_IDENTITY_API_KEY_EXCHANGE:identity.events}
      routing-key: ${USAGE_RABBIT_IDENTITY_API_KEY_ROUTING_KEY:identity.external-api-key.status-changed}
      queue: ${USAGE_RABBIT_IDENTITY_API_KEY_QUEUE:usage-service.identity.external-api-key.queue}
    cost-finalized:
      enabled: ${USAGE_RABBIT_COST_FINALIZED_ENABLED:true}
      exchange: ${USAGE_RABBIT_COST_FINALIZED_EXCHANGE:billing.events}
      routing-key: ${USAGE_RABBIT_COST_FINALIZED_ROUTING_KEY:usage.cost.finalized}
      queue: ${USAGE_RABBIT_COST_FINALIZED_QUEUE:usage-service.usage-cost-finalized.queue}
    summary-aggregation:
      enabled: ${USAGE_RABBIT_SUMMARY_AGGREGATION_ENABLED:true}
      exchange: ${USAGE_RABBIT_SUMMARY_AGGREGATION_EXCHANGE:usage.events}
      routing-key: ${USAGE_RABBIT_SUMMARY_AGGREGATION_ROUTING_KEY:usage.summary.aggregate}
      queue: ${USAGE_RABBIT_SUMMARY_AGGREGATION_QUEUE:usage-service.summary-aggregation.queue}
      dlx: ${USAGE_RABBIT_SUMMARY_AGGREGATION_DLX:usage.summary-aggregation.dlx}
      dlq: ${USAGE_RABBIT_SUMMARY_AGGREGATION_DLQ:usage-service.summary-aggregation.dlq}
    outbound-prediction:
      enabled: ${USAGE_RABBIT_OUTBOUND_PREDICTION_ENABLED:true}
      exchange: ${USAGE_RABBIT_OUTBOUND_PREDICTION_EXCHANGE:usage.events}
      routing-key: ${USAGE_RABBIT_OUTBOUND_PREDICTION_ROUTING_KEY:usage.prediction.signals}
  prediction-signals:
    cron: ${USAGE_PREDICTION_SIGNALS_CRON:0 15 0 * * *}
    schedule:
      enabled: ${USAGE_PREDICTION_SIGNALS_SCHEDULE_ENABLED:true}
  analytics:
    max-range-days: ${USAGE_ANALYTICS_MAX_RANGE_DAYS:400}
  team:
    base-url: ${USAGE_TEAM_SERVICE_URL:http://team-service:8093}
    cache-ttl-seconds: ${USAGE_TEAM_CACHE_TTL_SECONDS:180}
    timeout-ms: ${USAGE_TEAM_TIMEOUT_MS:1500}
  gateway:
    # 운영에서는 반드시 환경 변수로 덮어쓴다. 비어 있으면 로컬 기본값(게이트웨이·프록시와 동일).
    shared-secret: ${GATEWAY_SHARED_SECRET:local-dev-gateway-shared-secret-do-not-use-in-prod}

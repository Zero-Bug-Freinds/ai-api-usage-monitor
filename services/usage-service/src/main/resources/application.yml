server:
  port: ${USAGE_SERVICE_PORT:8092}

spring:
  application:
    name: usage-service
  datasource:
    url: jdbc:postgresql://${USAGE_POSTGRES_HOST:localhost}:${USAGE_POSTGRES_PORT:5433}/${USAGE_POSTGRES_DB:usage_db}
    username: ${USAGE_POSTGRES_USER:usage_app}
    password: ${USAGE_POSTGRES_PASSWORD:usage_app}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:${RABBITMQ_USER:guest}}
    password: ${SPRING_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:guest}}

management:
  endpoints:
    web:
      exposure:
        include: health,info

usage:
  rabbit:
    exchange: usage.events
    routing-key: usage.recorded
    queue: usage-service.queue
    cost-routing-key: usage.cost.finalized
    cost-queue: usage-service.cost.queue
  analytics:
    max-range-days: ${USAGE_ANALYTICS_MAX_RANGE_DAYS:400}
  gateway:
    # 운영에서는 반드시 환경 변수로 덮어쓴다. 비어 있으면 로컬 기본값(게이트웨이·프록시와 동일).
    shared-secret: ${GATEWAY_SHARED_SECRET:local-dev-gateway-shared-secret-do-not-use-in-prod}

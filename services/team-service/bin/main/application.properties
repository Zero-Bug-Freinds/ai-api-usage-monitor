spring.application.name=team-service

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${TEAM_POSTGRES_DB:${POSTGRES_DB:team_db}}
spring.datasource.username=${TEAM_POSTGRES_USER:${POSTGRES_USER:team_app}}
spring.datasource.password=${TEAM_POSTGRES_PASSWORD:${POSTGRES_PASSWORD:team_app}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

security.jwt.secret=${SECURITY_JWT_SECRET:${JWT_SECRET:change-this-secret-key-to-at-least-32-bytes}}
team.api-key.encryption.secret=${TEAM_API_KEY_ENCRYPTION_SECRET:change-this-team-api-key-encryption-secret-min-32-chars}

server.port=${TEAM_SERVICE_PORT:8093}
identity.service.url=${IDENTITY_SERVICE_URL:http://host.docker.internal:8090}

spring.application.name=team-service

# POSTGRES_* 로 폴백하지 않음 — identity용 비밀번호가 team_app 에 적용되면 인증 실패한다.
spring.datasource.url=jdbc:postgresql://${TEAM_POSTGRES_HOST:localhost}:${TEAM_POSTGRES_PORT:5434}/${TEAM_POSTGRES_DB:team_db}
spring.datasource.username=${TEAM_POSTGRES_USER:team_app}
spring.datasource.password=${TEAM_POSTGRES_PASSWORD:team_app}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

security.jwt.secret=${SECURITY_JWT_SECRET:${JWT_SECRET:change-this-secret-key-to-at-least-32-bytes}}
team.api-key.encryption.secret=${TEAM_API_KEY_ENCRYPTION_SECRET:change-this-team-api-key-encryption-secret-min-32-chars}

server.port=${TEAM_SERVICE_PORT:8093}
identity.service.url=${IDENTITY_SERVICE_URL:http://host.docker.internal:8090}

# team-member-added 이벤트 발행 설정 (RabbitMQ)
team.member-added-event.exchange=${TEAM_MEMBER_ADDED_EVENT_EXCHANGE:team.events}
team.member-added-event.routing-key=${TEAM_MEMBER_ADDED_EVENT_ROUTING_KEY:team-member-added}

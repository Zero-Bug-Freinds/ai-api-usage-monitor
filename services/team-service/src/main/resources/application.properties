spring.application.name=team-service

# POSTGRES_* 로 폴백하지 않음 — identity용 비밀번호가 team_app 에 적용되면 인증 실패한다.
spring.datasource.url=jdbc:postgresql://${TEAM_POSTGRES_HOST:localhost}:${TEAM_POSTGRES_PORT:5434}/${TEAM_POSTGRES_DB:team_db}
spring.datasource.username=${TEAM_POSTGRES_USER:team_app}
spring.datasource.password=${TEAM_POSTGRES_PASSWORD:team_app}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

security.jwt.secret=${SECURITY_JWT_SECRET:${JWT_SECRET:change-this-secret-key-to-at-least-32-bytes}}
team.api-key.encryption.secret=${TEAM_API_KEY_ENCRYPTION_SECRET:change-this-team-api-key-encryption-secret-min-32-chars}

server.port=${TEAM_SERVICE_PORT:8093}
identity.service.url=${IDENTITY_SERVICE_URL:http://host.docker.internal:8090}

# 팀 도메인 이벤트 발행 (RabbitMQ). JSON 본문 eventType + 동일 값 AMQP 헤더 eventType.
team.member-added-event.exchange=${TEAM_MEMBER_ADDED_EVENT_EXCHANGE:team.events}
team.member-added-event.routing-key=${TEAM_MEMBER_ADDED_EVENT_ROUTING_KEY:team-member-added}

# RabbitMQ 접속 정보 (로컬 bootRun 기본 localhost, Docker Compose는 SPRING_RABBITMQ_HOST=rabbitmq 주입)
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# identity -> team 회원 탈퇴 이벤트 소비
identity.account-deletion-event.exchange=${IDENTITY_ACCOUNT_DELETION_EVENT_EXCHANGE:identity.events}
identity.account-deletion-event.routing-key=${IDENTITY_ACCOUNT_DELETION_EVENT_ROUTING_KEY:identity.user.account-deletion-requested}
identity.account-deletion-event.team.queue=${IDENTITY_ACCOUNT_DELETION_EVENT_TEAM_QUEUE:team.account-deletion.requested.queue}

# identity -> team 사용자 동기화 이벤트 소비
identity.user-sync.exchange=${IDENTITY_USER_SYNC_EVENT_EXCHANGE:identity.events}
identity.user-sync.routing-key=${IDENTITY_USER_SYNC_EVENT_ROUTING_KEY:identity.user.sync}
identity.user-sync.queue=${IDENTITY_USER_SYNC_QUEUE:team.identity.user-sync.queue}

# team -> identity 회원 탈퇴 ACK 발행
identity.account-deletion-ack.exchange=${IDENTITY_ACCOUNT_DELETION_ACK_EXCHANGE:identity.events}
identity.account-deletion-ack.routing-key=${IDENTITY_ACCOUNT_DELETION_ACK_ROUTING_KEY:identity.user.account-deletion-ack}

# Team API Key status sync event for usage/billing
team.api-key-status-event.exchange=${TEAM_API_KEY_STATUS_EVENT_EXCHANGE:team.api-key.exchange}
team.api-key-status-event.routing-key=${TEAM_API_KEY_STATUS_EVENT_ROUTING_KEY:team.api-key.status.changed}
team.api-key-status-event.queue=${TEAM_API_KEY_STATUS_EVENT_QUEUE:team.api-key.status.changed.queue}

# Team invitation lifecycle
team.invitation.expiration-days=${TEAM_INVITATION_EXPIRATION_DAYS:7}
team.invitation.cleanup-retention-days=${TEAM_INVITATION_CLEANUP_RETENTION_DAYS:30}
team.invitation.lifecycle-fixed-delay-ms=${TEAM_INVITATION_LIFECYCLE_FIXED_DELAY_MS:3600000}
team.invitation.lifecycle-initial-delay-ms=${TEAM_INVITATION_LIFECYCLE_INITIAL_DELAY_MS:60000}

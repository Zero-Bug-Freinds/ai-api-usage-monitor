spring:
  application:
    name: llm-proxy-service
  datasource:
    url: jdbc:mysql://localhost:3307/proxy_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

google:
  gemini:
    base-url: https://generativelanguage.googleapis.com/v1beta/models/
    api-key: ${API_KEY:}

openai:
  api-key: ${OPENAI_API_KEY:}

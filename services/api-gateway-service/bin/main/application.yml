server:
  port: 8080

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      # SCG 5 + gateway-server-webflux: routes bind under server.webflux (not spring.cloud.gateway.routes).
      server:
        webflux:
          routes:
            # Client Authorization (platform JWT) is validated in SecurityConfiguration; strip before upstream — docs/contracts/gateway-proxy.md §3.1
            - id: proxy-ai
              uri: ${GATEWAY_PROXY_URI:http://localhost:8081}
              predicates:
                - Path=/api/v1/ai/**
              filters:
                - RemoveRequestHeader=Authorization
                - RewritePath=/api/v1/ai/(?<segment>.*), /proxy/${segment}

            # Usage HTTP (dashboard / analytics REST). Path unchanged downstream.
            - id: usage-http
              uri: ${GATEWAY_USAGE_URI:http://localhost:8092}
              predicates:
                - Path=/api/v1/usage/**
              filters:
                - RemoveRequestHeader=Authorization

            # Default matches scripts/bootrun.* billing port (8095); override via GATEWAY_BILLING_URI / .env.
            - id: billing-http
              uri: ${GATEWAY_BILLING_URI:http://localhost:8095}
              predicates:
                - Path=/api/v1/expenditure/**
              filters:
                - RemoveRequestHeader=Authorization

            - id: identity-http
              uri: ${GATEWAY_IDENTITY_URI:http://localhost:8090}
              predicates:
                - Path=/api/identity/**
              filters:
                - RemoveRequestHeader=Authorization
                - RewritePath=/api/identity/(?<segment>.*), /api/${segment}

            - id: team-http
              uri: ${GATEWAY_TEAM_URI:http://localhost:8093}
              predicates:
                - Path=/api/team/**
              filters:
                - RemoveRequestHeader=Authorization
                - RewritePath=/api/team/(?<segment>.*), /api/v1/${segment}

            - id: notification-http
              uri: ${GATEWAY_NOTIFICATION_URI:http://localhost:8096}
              predicates:
                - Path=/api/notification/**
              filters:
                - RemoveRequestHeader=Authorization
                - RewritePath=/api/notification/(?<segment>.*), /api/${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info

gateway:
  # Set false in production with gateway.jwt.secret (HMAC256, same as platform tokens).
  dev-mode: ${GATEWAY_DEV_MODE:true}
  # 운영에서는 GATEWAY_SHARED_SECRET 필수. 미설정 시 로컬 기본값(usage-service·proxy와 동일).
  shared-secret: ${GATEWAY_SHARED_SECRET:local-dev-gateway-shared-secret-do-not-use-in-prod}
  jwt:
    secret: ${GATEWAY_JWT_SECRET:change-this-secret-key-to-at-least-32-bytes}
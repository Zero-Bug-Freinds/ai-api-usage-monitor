    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.notification == 'true' || needs.changes.outputs.web_shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build (Nest)
        run: pnpm --filter notification-service run build
      - name: Docker image (notification-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/notification-service/Dockerfile
          tags: notification-service:ci
          load: true
          push: false
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,mode=max,scope=notification-service
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (notification-web)
        run: |
          pnpm --filter notification-web run lint
          pnpm --filter notification-web test
          pnpm --filter notification-web run build
      - name: Docker image (notification-web, standalone)
        id: docker_notification_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/notification-service/web/Dockerfile
          tags: notification-web:ci
          load: true
          push: false
          cache-from: type=gha,scope=notification-web
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=notification-web
      - name: Notification-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (notification-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`notification-web:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_notification_web.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`notification-web\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  web-host:
    name: Build web-host (apps/web)
    runs-on: ubuntu-latest
    needs: changes
    # Temporary emergency bypass: skip web-host CI until prerender/useContext issue is fixed.
    if: false
    env:
      NEXT_PRIVATE_LOCAL_WEBPACK: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (web-host)
        run: |
          pnpm --filter web-host run lint
          pnpm --filter web-host run test
          pnpm --filter web-host run build
      - name: Verify host remotes configuration
        run: |
          node -e "const fs=require('node:fs');const p='apps/web/next.config.mjs';const c=fs.readFileSync(p,'utf8');for(const x of ['NextFederationPlugin','team@','usage@','remoteEntry.js']){if(!c.includes(x)){throw new Error('missing '+x+' in '+p)}}"
      - name: Docker image (web-host, standalone)
        # TODO(cache-migration): docker/build-push-action + type=gha 전환 후보
        #   scope 예시: web-node-deps-cache, web-host-cache
        run: docker build -f docker/web-node-deps.Dockerfile -t web-node-deps:ci . && docker build --build-arg WEB_NODE_DEPS_IMAGE=web-node-deps:ci -f apps/web/Dockerfile -t web-host:ci .

  web-mfe:
    name: Build web-mfe remotes (usage/team)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.web_mfe == 'true' || needs.changes.outputs.web_shared == 'true'
    env:
      NEXT_PRIVATE_LOCAL_WEBPACK: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Verify MF plugin settings (usage/team remotes)
        run: |
          node -e "const fs=require('node:fs');const checks=[['services/usage-service/web-mfe/next.config.ts',['NextFederationPlugin','name: \"usage\"','filename: \"static/chunks/remoteEntry.js\"']],['services/team-service/web-mfe/next.config.ts',['NextFederationPlugin','name: \"team\"','filename: \"static/chunks/remoteEntry.js\"']]];for(const [p,needles] of checks){const c=fs.readFileSync(p,'utf8');for(const n of needles){if(!c.includes(n)){throw new Error('missing '+n+' in '+p)}}}"
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / typecheck / build (web-mfe)
        run: |
          pnpm --filter usage-web-mfe run lint
          pnpm --filter team-web-mfe run lint
          pnpm --filter usage-web-mfe exec tsc --noEmit
          pnpm --filter team-web-mfe exec tsc --noEmit
          pnpm --filter usage-web-mfe run build
          pnpm --filter team-web-mfe run build
      - name: Docker image (usage-web-mfe, standalone)
        id: docker_usage_web_mfe
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/usage-service/web-mfe/Dockerfile
          tags: usage-web-mfe:ci
          load: true
          push: false
          cache-from: type=gha,scope=usage-web-mfe
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=usage-web-mfe
      - name: Usage-web-mfe image summary
        if: always()
        run: |
          echo "## Docker image build summary (usage-web-mfe)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`usage-web-mfe:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_usage_web_mfe.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`usage-web-mfe\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
      - name: Docker image (team-web-mfe, standalone)
        id: docker_team_web_mfe
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/team-service/web-mfe/Dockerfile
          tags: team-web-mfe:ci
          load: true
          push: false
          cache-from: type=gha,scope=team-web-mfe
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=team-web-mfe
      - name: Team-web-mfe image summary
        if: always()
        run: |
          echo "## Docker image build summary (team-web-mfe)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`team-web-mfe:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_team_web_mfe.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`team-web-mfe\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  # Single required check for branch protection.
  # Skipped Java/Compose jobs (path filter) do not fail the workflow.
  ci-observability:
    name: CI observability metrics
    runs-on: ubuntu-latest
    needs:
      - changes
      - gitleaks
      - compose-validate
      - web-edge
      - api-gateway-service
      - identity-service
      - agent-service
      - proxy-service
      - usage-service
      - billing-service
      - team-service
      - notification-service
      - web-host
      - web-mfe
    if: always()
    steps:
      - name: Collect job metrics from Actions API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" > jobs.json
          echo "## CI Job Duration Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result | Duration(s) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---:|---:|" >> "$GITHUB_STEP_SUMMARY"
          if jq -e '.jobs | type == "array"' jobs.json > /dev/null; then
            jq -r '.jobs[] | select(type=="object") | [(.name // "n/a"), (.conclusion // "n/a"), (if ((.completed_at // null) | type) == "string" and ((.started_at // null) | type) == "string" then ((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601) | tostring) else "n/a" end)] | @tsv' jobs.json \
              | while IFS=$'\t' read -r name result dur; do
                  echo "| $name | $result | $dur |" >> "$GITHUB_STEP_SUMMARY"
                done
          else
            echo "| api-response-invalid | n/a | n/a |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Raw jobs API response (first 20 lines):" >> "$GITHUB_STEP_SUMMARY"
            head -n 20 jobs.json >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Cache/Container observation notes" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node cache hit 여부는 각 서비스 setup-node step 로그를 참고" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker 단계 시간은 각 Job step duration(표)에서 Docker step 포함 Job을 비교" >> "$GITHUB_STEP_SUMMARY"
          echo "- usage 통합테스트 컨테이너 기동 여유는 withStartupTimeout(5m) 적용 상태" >> "$GITHUB_STEP_SUMMARY"
          echo "- web-mfe Docker cache hit 여부는 build-push-action 로그의 CACHED 레이어 비율로 확인" >> "$GITHUB_STEP_SUMMARY"

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - gitleaks
      - compose-validate
      - web-edge
      - api-gateway-service
      - identity-service
      - agent-service
      - proxy-service
      - usage-service
      - billing-service
      - team-service
      - notification-service
      - web-host
      - web-mfe
      - ci-observability
    if: always()
    steps:
      - name: Assert required jobs
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [[ "${{ needs.gitleaks.result }}" != "success" ]]; then
            echo "gitleaks did not succeed: ${{ needs.gitleaks.result }}"
            exit 1
          fi
          if [[ "${{ needs.compose-validate.result }}" != "success" ]]; then
            echo "compose-validate did not succeed: ${{ needs.compose-validate.result }}"
            exit 1
          fi
          for name in web-edge api-gateway-service identity-service agent-service proxy-service usage-service billing-service team-service notification-service web-host web-mfe ci-observability; do
            case "$name" in
              web-edge) v="${{ needs['web-edge'].result }}" ;;
              api-gateway-service) v="${{ needs['api-gateway-service'].result }}" ;;
              identity-service) v="${{ needs.identity-service.result }}" ;;
              agent-service) v="${{ needs.agent-service.result }}" ;;
              proxy-service) v="${{ needs.proxy-service.result }}" ;;
              usage-service) v="${{ needs.usage-service.result }}" ;;
              billing-service) v="${{ needs.billing-service.result }}" ;;
              team-service) v="${{ needs.team-service.result }}" ;;
              notification-service) v="${{ needs.notification-service.result }}" ;;
              web-host) v="${{ needs['web-host'].result }}" ;;
              web-mfe) v="${{ needs['web-mfe'].result }}" ;;
              ci-observability) v="${{ needs['ci-observability'].result }}" ;;
            esac
            if [[ "$v" == "failure" || "$v" == "cancelled" ]]; then
              echo "$name ended with $v"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped appropriately."
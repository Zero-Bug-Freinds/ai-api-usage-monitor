# CI aligned with docs/architecture.md §8.2 (secret scanning), §10 (Compose).
# Branch triggers: docs/branch-conventions.md (main, develop, PR targets).

name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'docker/**'
      - 'services/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'libs/**'
      - 'docker-compose.yml'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'docker/**'
      - 'services/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'libs/**'
      - 'docker-compose.yml'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  # 기본은 read-only 유지(최소 권한). type=gha cache export가 필요한 job만 actions: write를 부여한다.

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web_edge: ${{ steps.filter.outputs.web_edge }}
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      identity: ${{ steps.filter.outputs.identity }}
      ai_agent: ${{ steps.filter.outputs.ai_agent }}
      proxy: ${{ steps.filter.outputs.proxy }}
      usage: ${{ steps.filter.outputs.usage }}
      billing: ${{ steps.filter.outputs.billing }}
      team: ${{ steps.filter.outputs.team }}
      notification: ${{ steps.filter.outputs.notification }}
      web_host: ${{ steps.filter.outputs.web_host }}
      web_mfe: ${{ steps.filter.outputs.web_mfe }}
      web_shared: ${{ steps.filter.outputs.web_shared }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            web_edge:
              - 'docker/web-edge/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            api_gateway:
              - 'services/api-gateway-service/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            identity:
              - 'services/identity-service/**'
            ai_agent:
              - 'services/agent-service/**'
              - 'libs/identity-events/**'
              - 'libs/usage-events/**'
            proxy:
              - 'services/proxy-service/**'
              - 'libs/usage-events/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            usage:
              - 'services/usage-service/**'
              - 'libs/usage-events/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            billing:
              - 'services/billing-service/**'
              - 'libs/usage-events/**'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            team:
              - 'services/team-service/**'
            notification:
              - 'services/notification-service/**'
              - 'docker/backend-node-deps.Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            web_host:
              - 'apps/web/**'
            web_mfe:
              - 'services/usage-service/web-mfe/**'
              - 'services/team-service/web-mfe/**'
            web_shared:
              - 'packages/ui/**'
              - 'packages/shell/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'docker/web-node-deps.Dockerfile'
            workflows:
              - '.github/workflows/**'

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  compose-validate:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config

  identity-service:
    name: Build identity-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.identity == 'true' || needs.changes.outputs.web_shared == 'true'
    defaults:
      run:
        working-directory: services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/identity-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (identity-web)
        run: |
          pnpm --filter identity-web run lint
          pnpm --filter identity-web test
          pnpm run build:identity-web
        working-directory: .
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (identity-web, standalone) (cache gha)
        id: docker_identity_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/identity-service/web/Dockerfile
          tags: identity-web:ci
          load: true
          push: false
          cache-from: type=gha,scope=identity-web
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=identity-web
      - name: Identity-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (identity-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`identity-web:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_identity_web.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`identity-web\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  agent-service:
    name: Build agent-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.ai_agent == 'true' || needs.changes.outputs.web_shared == 'true'
    defaults:
      run:
        working-directory: services/agent-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            services/agent-service/build.gradle
            libs/identity-events/build.gradle
            libs/usage-events/build.gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: current
      - name: Build and test
        run: gradle build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / build (agent-web)
        run: |
          pnpm --filter agent-web run lint
          pnpm --filter agent-web run build
        working-directory: .
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (agent-web, standalone) (cache gha)
        id: docker_agent_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/agent-service/web/Dockerfile
          tags: agent-web:ci
          load: true
          push: false
          cache-from: type=gha,scope=agent-web
          cache-to: type=gha,mode=min,scope=agent-web
      - name: Agent-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (agent-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`agent-web:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_agent_web.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`agent-web\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  web-edge:
    name: Validate web-edge
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.web_edge == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Validate web-edge compose config
        run: docker compose -f docker-compose.yml config
      - name: Validate nginx template syntax
        run: |
          docker run --rm \
            --add-host identity-web:127.0.0.1 \
            --add-host usage-web:127.0.0.1 \
            --add-host team-web:127.0.0.1 \
            --add-host billing-web:127.0.0.1 \
            --add-host notification-web:127.0.0.1 \
            --add-host api-gateway-service:127.0.0.1 \
            -v "${{ github.workspace }}/docker/web-edge/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro" \
            -e GATEWAY_SHARED_SECRET=ci-web-edge-shared-secret \
            nginx:1.27-alpine \
            sh -lc 'set -eu; apk add --no-cache gettext >/dev/null; envsubst '"'"'${GATEWAY_SHARED_SECRET}'"'"' < /etc/nginx/templates/nginx.conf.template > /tmp/nginx.conf; nginx -t -c /tmp/nginx.conf'

  api-gateway-service:
    name: Build api-gateway-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.api_gateway == 'true'
    defaults:
      run:
        working-directory: services/api-gateway-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/api-gateway-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (api-gateway-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: services/api-gateway-service
          file: services/api-gateway-service/Dockerfile
          tags: api-gateway-service:ci
          load: true
          push: false
          cache-from: type=gha,scope=api-gateway-service
          cache-to: type=gha,mode=max,scope=api-gateway-service

  proxy-service:
    name: Build proxy-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.proxy == 'true'
    defaults:
      run:
        working-directory: services/proxy-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/proxy-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

      - uses: docker/setup-buildx-action@v3
      - name: Docker image (proxy-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: services/proxy-service
          file: services/proxy-service/Dockerfile
          tags: proxy-service:ci
          load: true
          push: false
          cache-from: type=gha,scope=proxy-service
          cache-to: type=gha,mode=max,scope=proxy-service


        if: always()
        run: |
          echo "## Docker image build summary (team-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \\`team-web:ci\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \\`${{ steps.docker_team_web.outputs.digest }}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \\`team-web\\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  notification-service:

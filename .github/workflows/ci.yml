      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (billing-web)
        run: |
          pnpm --filter billing-web run lint
          pnpm --filter billing-web test
          pnpm run build:billing-web
        working-directory: .
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (billing-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/billing-service/Dockerfile
          tags: billing-service:ci
          load: true
          push: false
          cache-from: type=gha,scope=billing-service
          cache-to: type=gha,mode=max,scope=billing-service
      - name: Docker image (billing-web, standalone) (cache gha)
        id: docker_billing_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/billing-service/web/Dockerfile
          tags: billing-web:ci
          load: true
          push: false
          cache-from: type=gha,scope=billing-web
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=billing-web
      - name: Billing-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (billing-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \\`billing-web:ci\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \\`${{ steps.docker_billing_web.outputs.digest }}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \\`billing-web\\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  team-service:
    name: Build team-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.team == 'true' || needs.changes.outputs.web_shared == 'true'

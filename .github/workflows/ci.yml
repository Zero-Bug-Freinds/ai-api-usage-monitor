# CI aligned with docs/architecture.md §8.2 (secret scanning), §10 (Compose).
# Branch triggers: docs/branch-conventions.md (main, develop, PR targets).

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      identity: ${{ steps.filter.outputs.identity }}
      proxy: ${{ steps.filter.outputs.proxy }}
      usage: ${{ steps.filter.outputs.usage }}
      billing: ${{ steps.filter.outputs.billing }}
      team: ${{ steps.filter.outputs.team }}
      web: ${{ steps.filter.outputs.web }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identity:
              - 'services/identity-service/**'
            proxy:
              - 'services/proxy-service/**'
              - 'services/api-gateway-service/**'
              - 'libs/usage-events/**'
            usage:
              - 'services/usage-service/**'
              - 'libs/usage-events/**'
            billing:
              - 'services/billing-service/**'
              - 'libs/usage-events/**'
            team:
              - 'services/team-service/**'
            web:
              - 'services/identity-service/web/**'
              - 'services/usage-service/web/**'
              - 'services/billing-service/web/**'
              - 'services/team-service/web/**'
              - 'packages/ui/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'pnpm-lock.yaml'
            workflows:
              - '.github/workflows/**'

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  compose-validate:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config

  identity-service:
    name: Build identity-service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.identity == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/identity-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

  proxy-gateway-service:
    name: Build proxy-gateway-service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.proxy == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/proxy-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/proxy-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

      # api-gateway-service는 proxy-service/아래에서 함께 빌드
      - name: Grant execute permission for api-gateway-service gradlew
        run: chmod +x ../api-gateway-service/gradlew
      - name: Build and test (api-gateway-service)
        run: cd ../api-gateway-service && ./gradlew build --no-daemon

  usage-service:
    name: Build usage-service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.usage == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/usage-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/usage-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

  billing-service:
    name: Build billing-service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.billing == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/billing-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/billing-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

  team-service:
    name: Build team-service
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.team == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/team-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/team-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

  web:
    name: Build web (identity + usage + team)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Lint / test / build (Next apps)
        run: |
          pnpm --filter identity-web run lint
          pnpm --filter usage-web run lint
          pnpm --filter billing-web run lint
          pnpm --filter team-web run lint
          pnpm --filter identity-web test
          pnpm --filter usage-web test
          pnpm --filter billing-web test
          pnpm --filter team-web test
          pnpm run build:web
      - name: Docker image (identity-web, standalone)
        run: docker build -f services/identity-service/web/Dockerfile -t identity-web:ci .
      - name: Docker image (usage-web, standalone)
        run: docker build -f services/usage-service/web/Dockerfile -t usage-web:ci .
      - name: Docker image (billing-web, standalone)
        run: docker build -f services/billing-service/web/Dockerfile -t billing-web:ci .
      - name: Docker image (team-web, standalone)
        run: docker build -f services/team-service/web/Dockerfile -t team-web:ci .

  # Single required check for branch protection.
  # Skipped Java/Compose jobs (path filter) do not fail the workflow.
  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - gitleaks
      - compose-validate
      - identity-service
      - proxy-gateway-service
      - usage-service
      - billing-service
      - team-service
      - web
    if: always()
    steps:
      - name: Assert required jobs
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [[ "${{ needs.gitleaks.result }}" != "success" ]]; then
            echo "gitleaks did not succeed: ${{ needs.gitleaks.result }}"
            exit 1
          fi
          if [[ "${{ needs.compose-validate.result }}" != "success" ]]; then
            echo "compose-validate did not succeed: ${{ needs.compose-validate.result }}"
            exit 1
          fi
          for name in identity-service proxy-gateway-service usage-service billing-service team-service web; do
            case "$name" in
              identity-service) v="${{ needs.identity-service.result }}" ;;
              proxy-gateway-service) v="${{ needs.proxy-gateway-service.result }}" ;;
              usage-service) v="${{ needs.usage-service.result }}" ;;
              billing-service) v="${{ needs.billing-service.result }}" ;;
              team-service) v="${{ needs.team-service.result }}" ;;
              web) v="${{ needs.web.result }}" ;;
            esac
            if [[ "$v" == "failure" || "$v" == "cancelled" ]]; then
              echo "$name ended with $v"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped appropriately."
          pnpm run build:usage-web
        working-directory: .
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (usage-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/usage-service/Dockerfile
          tags: usage-service:ci
          load: true
          push: false
          cache-from: type=gha,scope=usage-service
          cache-to: type=gha,mode=max,scope=usage-service
      - name: Docker image (usage-web, standalone) (cache gha)
        id: docker_usage_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/usage-service/web/Dockerfile
          tags: usage-web:ci
          load: true
          push: false
          cache-from: type=gha,scope=usage-web
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=usage-web
      - name: Usage-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (usage-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`usage-web:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_usage_web.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`usage-web\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  billing-service:
    name: Build billing-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.billing == 'true' || needs.changes.outputs.web_shared == 'true'
    defaults:
      run:
        working-directory: services/billing-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/billing-service/build.gradle
      - name: Grant execute permission for gradlew

# CI aligned with docs/architecture.md §8.2 (secret scanning), §10 (Compose).
# Branch triggers: docs/branch-conventions.md (main, develop, PR targets).

name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'docker/**'
      - 'services/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'libs/**'
      - 'infra/terraform/**'
      - 'docker-compose.yml'
      - 'docker-compose-prod.yml'
      - '.env.deploy.example'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'docker/**'
      - 'services/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'libs/**'
      - 'infra/terraform/**'
      - 'docker-compose.yml'
      - 'docker-compose-prod.yml'
      - '.env.deploy.example'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  # 기본은 read-only 유지(최소 권한). type=gha cache export가 필요한 job만 actions: write를 부여한다.

jobs:
  changes:
    uses: ./.github/workflows/path-changes.yml

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
      - name: terraform fmt (check)
        run: terraform fmt -check -recursive
      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false
      # validate does not always accept -var through the Actions Terraform wrapper; TF_VAR_* is portable.
      - name: terraform validate
        env:
          TF_VAR_aws_region: us-east-1
          TF_VAR_github_org: ci-placeholder
          TF_VAR_github_repo: ci-placeholder
        run: terraform validate

  compose-validate:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config
      - name: Validate docker-compose-prod.yml (example env)
        run: docker compose -f docker-compose-prod.yml --env-file .env.deploy.example config

  identity-service:
    name: Build identity-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.identity == 'true' || needs.changes.outputs.web_shared == 'true'
    defaults:
      run:
        working-directory: services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/identity-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (identity-web)
        run: |
          pnpm --filter identity-web run lint
          pnpm --filter identity-web test
          pnpm run build:identity-web
        working-directory: .
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (identity-web, standalone) (cache gha)
        id: docker_identity_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/identity-service/web/Dockerfile
          tags: identity-web:ci
          load: true
          push: false
          cache-from: type=gha,scope=identity-web
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=identity-web
      - name: Identity-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (identity-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`identity-web:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_identity_web.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`identity-web\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  agent-service:
    name: Build agent-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    # Temporarily disabled; restore path condition when re-enabling:
    if: needs.changes.outputs.ai_agent == 'true' || needs.changes.outputs.web_shared == 'true'
    defaults:
      run:
        working-directory: services/agent-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            services/agent-service/build.gradle
            libs/identity-events/build.gradle
            libs/usage-events/build.gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: current
      - name: Build and test
        run: gradle build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / build (agent-web)
        run: |
          pnpm --filter agent-web run lint
          pnpm --filter agent-web run build
        working-directory: .
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (agent-web, standalone) (cache gha)
        id: docker_agent_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/agent-service/web/Dockerfile
          tags: agent-web:ci
          load: true
          push: false
          cache-from: type=gha,scope=agent-web
          cache-to: type=gha,mode=min,scope=agent-web
      - name: Agent-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (agent-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`agent-web:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_agent_web.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`agent-web\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  web-edge:
    name: Validate web-edge
    runs-on: ubuntu-latest
    needs:
      - changes
    if: needs.changes.outputs.web_edge == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Validate web-edge compose config
        run: docker compose -f docker-compose.yml config
      - name: Build web-edge image and validate nginx config
        run: |
          set -euo pipefail
          docker build -f docker/web-edge/Dockerfile -t web-edge:ci "${{ github.workspace }}"
          docker run --rm \
            --add-host=identity-web:127.0.0.1 \
            --add-host=usage-web:127.0.0.1 \
            --add-host=team-web:127.0.0.1 \
            --add-host=billing-web:127.0.0.1 \
            --add-host=notification-web:127.0.0.1 \
            --add-host=agent-web:127.0.0.1 \
            --add-host=api-gateway-service:127.0.0.1 \
            -e GATEWAY_SHARED_SECRET=ci-web-edge-shared-secret \
            web-edge:ci nginx -t

  api-gateway-service:
    name: Build api-gateway-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.api_gateway == 'true'
    defaults:
      run:
        working-directory: services/api-gateway-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/api-gateway-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (api-gateway-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: services/api-gateway-service
          file: services/api-gateway-service/Dockerfile
          tags: api-gateway-service:ci
          load: true
          push: false
          cache-from: type=gha,scope=api-gateway-service
          cache-to: type=gha,mode=max,scope=api-gateway-service

  proxy-service:
    name: Build proxy-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.proxy == 'true'
    defaults:
      run:
        working-directory: services/proxy-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/proxy-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

      - uses: docker/setup-buildx-action@v3
      - name: Docker image (proxy-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: services/proxy-service
          file: services/proxy-service/Dockerfile
          tags: proxy-service:ci
          load: true
          push: false
          cache-from: type=gha,scope=proxy-service
          cache-to: type=gha,mode=max,scope=proxy-service

  usage-service:
    name: Build usage-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.usage == 'true' || needs.changes.outputs.web_shared == 'true'
    defaults:
      run:
        working-directory: services/usage-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            services/usage-service/build.gradle
            libs/usage-events/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (usage-web)
        run: |
          pnpm --filter usage-web run lint
          pnpm --filter usage-web test
          pnpm run build:usage-web
        working-directory: .
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (usage-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/usage-service/Dockerfile
          tags: usage-service:ci
          load: true
          push: false
          cache-from: type=gha,scope=usage-service
          cache-to: type=gha,mode=max,scope=usage-service
      - name: Docker image (usage-web, standalone) (cache gha)
        id: docker_usage_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/usage-service/web/Dockerfile
          tags: usage-web:ci
          load: true
          push: false
          cache-from: type=gha,scope=usage-web
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=usage-web
      - name: Usage-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (usage-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`usage-web:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_usage_web.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`usage-web\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  # Split backend vs web so wall time ~= max(backend, web) instead of sum (see services/billing-service/gradle.properties).
  billing-service-backend:
    name: Build billing-service (backend)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.billing == 'true' || needs.changes.outputs.web_shared == 'true'
    defaults:
      run:
        working-directory: services/billing-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            services/billing-service/build.gradle
            libs/usage-events/build.gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: services/billing-service
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      # check = compile + test (+ verification); skips bootJar (Dockerfile builds jar separately).
      # Use services/billing-service/gradle.properties worker/parallel defaults so Testcontainers-backed
      # tests do not contend with many concurrent Gradle workers on ubuntu-latest runners.
      - name: Build and test
        env:
          # Belt-and-suspenders with src/test/resources/testcontainers.properties (Ryuk can race on free runners).
          TESTCONTAINERS_RYUK_DISABLED: true
        run: ./gradlew check --no-daemon --build-cache
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (billing-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/billing-service/Dockerfile
          tags: billing-service:ci
          load: true
          push: false
          cache-from: type=gha,scope=billing-service
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=billing-service

  billing-service-web:
    name: Build billing-service (web)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.billing == 'true' || needs.changes.outputs.web_shared == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (billing-web)
        run: |
          pnpm --filter billing-web run lint
          pnpm --filter billing-web test
          pnpm run build:billing-web
      - uses: docker/setup-buildx-action@v3
      - name: Docker image (billing-web, standalone) (cache gha)
        id: docker_billing_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/billing-service/web/Dockerfile
          tags: billing-web:ci
          load: true
          push: false
          cache-from: type=gha,scope=billing-web
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=billing-web
      - name: Billing-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (billing-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \\`billing-web:ci\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \\`${{ steps.docker_billing_web.outputs.digest }}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \\`billing-web\\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  team-service:
    name: Build team-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.team == 'true' || needs.changes.outputs.web_shared == 'true'
    defaults:
      run:
        working-directory: services/team-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            services/team-service/build.gradle
            libs/identity-events/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
  notification-service:
    name: Build notification-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    needs:
      - changes
    if: needs.changes.outputs.notification == 'true' || needs.changes.outputs.web_shared == 'true'
    steps:
      - uses: actions/checkout@v4
      # Default docker-container driver is required for type=gha cache-to (docker driver cannot export GHA cache).
      # load:false avoids exporting the full image tarball into the daemon (often 10+ minutes on runners); this job does not docker-run these images.
      - uses: docker/setup-buildx-action@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build (Nest)
        run: pnpm --filter notification-service run build
      - name: Docker image (notification-service) (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/notification-service/Dockerfile
          tags: notification-service:ci
          load: false
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=notification-service
          cache-to: type=gha,mode=max,scope=notification-service
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI.
      # Next.js production build runs in the Docker step below (no duplicate host build).
      - name: Lint / test (notification-web)
        run: |
          pnpm --filter notification-web run lint
          pnpm --filter notification-web test
      - name: Docker image (notification-web, standalone)
        id: docker_notification_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/notification-service/web/Dockerfile
          tags: notification-web:ci
          load: false
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=notification-web
          # NOTE: 무료 티어(10GB)에서 캐시가 커지면 mode=min으로 유지하는 편이 안정적이다.
          cache-to: type=gha,mode=min,scope=notification-web
      - name: Notification-web image summary
        if: always()
        run: |
          echo "## Docker image build summary (notification-web)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`notification-web:ci\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.docker_notification_web.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache scope: \`notification-web\` (type=gha)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

  # Single required check for branch protection.
  # Skipped Java/Compose jobs (path filter) do not fail the workflow.
  ci-observability:
    name: CI observability metrics
    runs-on: ubuntu-latest
    needs:
      - changes
      - gitleaks
      - compose-validate
      - web-edge
      - api-gateway-service
      - identity-service
      - agent-service
      - proxy-service
      - usage-service
      - billing-service-backend
      - billing-service-web
      - team-service
      - notification-service
    if: always()
    steps:
      - name: Collect job metrics from Actions API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" > jobs.json
          echo "## CI Job Duration Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result | Duration(s) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---:|---:|" >> "$GITHUB_STEP_SUMMARY"
          if jq -e '.jobs | type == "array"' jobs.json > /dev/null; then
            jq -r '.jobs[] | select(type=="object") | [(.name // "n/a"), (.conclusion // "n/a"), (if ((.completed_at // null) | type) == "string" and ((.started_at // null) | type) == "string" then ((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601) | tostring) else "n/a" end)] | @tsv' jobs.json \
              | while IFS=$'\t' read -r name result dur; do
                  echo "| $name | $result | $dur |" >> "$GITHUB_STEP_SUMMARY"
                done
          else
            echo "| api-response-invalid | n/a | n/a |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Raw jobs API response (first 20 lines):" >> "$GITHUB_STEP_SUMMARY"
            head -n 20 jobs.json >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Cache/Container observation notes" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node cache hit 여부는 각 서비스 setup-node step 로그를 참고" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker 단계 시간은 각 Job step duration(표)에서 Docker step 포함 Job을 비교" >> "$GITHUB_STEP_SUMMARY"
          echo "- usage 통합테스트 컨테이너 기동 여유는 withStartupTimeout(5m) 적용 상태" >> "$GITHUB_STEP_SUMMARY"

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - gitleaks
      - terraform
      - compose-validate
      - web-edge
      - api-gateway-service
      - identity-service
      - agent-service
      - proxy-service
      - usage-service
      - billing-service-backend
      - billing-service-web
      - team-service
      - notification-service
      - ci-observability
    if: always()
    steps:
      - name: Assert required jobs
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [[ "${{ needs.gitleaks.result }}" != "success" ]]; then
            echo "gitleaks did not succeed: ${{ needs.gitleaks.result }}"
            exit 1
          fi
          if [[ "${{ needs.terraform.result }}" != "success" ]]; then
            echo "terraform did not succeed: ${{ needs.terraform.result }}"
            exit 1
          fi
          if [[ "${{ needs.compose-validate.result }}" != "success" ]]; then
            echo "compose-validate did not succeed: ${{ needs.compose-validate.result }}"
            exit 1
          fi
          for name in web-edge api-gateway-service identity-service agent-service proxy-service usage-service billing-service-backend billing-service-web team-service notification-service ci-observability; do
            case "$name" in
              web-edge) v="${{ needs['web-edge'].result }}" ;;
              api-gateway-service) v="${{ needs['api-gateway-service'].result }}" ;;
              identity-service) v="${{ needs.identity-service.result }}" ;;
              agent-service) v="${{ needs.agent-service.result }}" ;;
              proxy-service) v="${{ needs.proxy-service.result }}" ;;
              usage-service) v="${{ needs.usage-service.result }}" ;;
              billing-service-backend) v="${{ needs['billing-service-backend'].result }}" ;;
              billing-service-web) v="${{ needs['billing-service-web'].result }}" ;;
              team-service) v="${{ needs.team-service.result }}" ;;
              notification-service) v="${{ needs.notification-service.result }}" ;;
              ci-observability) v="${{ needs['ci-observability'].result }}" ;;
            esac
            if [[ "$v" == "failure" || "$v" == "cancelled" ]]; then
              echo "$name ended with $v"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped appropriately."
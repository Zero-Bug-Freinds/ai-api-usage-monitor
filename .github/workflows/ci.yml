      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI

# CI aligned with docs/architecture.md §8.2 (secret scanning), §10 (Compose).
# Branch triggers: docs/branch-conventions.md (main, develop, PR targets).

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '.github/workflows/**'
      - 'docker/**'
      - 'services/**'
      - 'apps/web/**'
      - 'packages/**'
      - 'libs/**'
      - 'docker-compose.yml'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      identity: ${{ steps.filter.outputs.identity }}
      proxy: ${{ steps.filter.outputs.proxy }}
      usage: ${{ steps.filter.outputs.usage }}
      billing: ${{ steps.filter.outputs.billing }}
      team: ${{ steps.filter.outputs.team }}
      notification: ${{ steps.filter.outputs.notification }}
      web_host: ${{ steps.filter.outputs.web_host }}
      web_mfe: ${{ steps.filter.outputs.web_mfe }}
      web_shared: ${{ steps.filter.outputs.web_shared }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            identity:
              - 'services/identity-service/**'
            proxy:
              - 'services/proxy-service/**'
              - 'services/api-gateway-service/**'
              - 'libs/usage-events/**'
            usage:
              - 'services/usage-service/**'
              - 'libs/usage-events/**'
            billing:
              - 'services/billing-service/**'
              - 'libs/usage-events/**'
            team:
              - 'services/team-service/**'
            notification:
              - 'services/notification-service/**'
              - 'docker/backend-node-deps.Dockerfile'
            web_host:
              - 'apps/web/**'
            web_mfe:
              - 'services/usage-service/web-mfe/**'
              - 'services/team-service/web-mfe/**'
            web_shared:
              - 'packages/ui/**'
              - 'packages/shell/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'docker/web-node-deps.Dockerfile'
            workflows:
              - '.github/workflows/**'

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  compose-validate:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config

  build-common-java:
    name: Build common Java artifacts (Stage A)
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.identity == 'true' ||
      needs.changes.outputs.proxy == 'true' ||
      needs.changes.outputs.usage == 'true' ||
      needs.changes.outputs.billing == 'true' ||
      needs.changes.outputs.team == 'true' ||
      needs.changes.outputs.notification == 'true' ||
      needs.changes.outputs.web_shared == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            services/usage-service/build.gradle
            libs/usage-events/build.gradle
      - name: Grant execute permission for gradlew (usage-service)
        run: chmod +x services/usage-service/gradlew
      - name: Build usage-events JAR
        run: ./gradlew :usage-events:jar --no-daemon
        working-directory: services/usage-service
      - name: Upload usage-events artifact
        uses: actions/upload-artifact@v4
        with:
          name: usage-events-jar
          path: libs/usage-events/build/libs/*.jar
          if-no-files-found: error
          retention-days: 1

  build-common-node:
    name: Warm Node workspace cache (Stage A)
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.identity == 'true' ||
      needs.changes.outputs.usage == 'true' ||
      needs.changes.outputs.billing == 'true' ||
      needs.changes.outputs.team == 'true' ||
      needs.changes.outputs.notification == 'true' ||
      needs.changes.outputs.web_host == 'true' ||
      needs.changes.outputs.web_mfe == 'true' ||
      needs.changes.outputs.web_shared == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Node cache status
        run: echo "setup-node cache-hit=${{ steps.setup-node.outputs.cache-hit }}"

  build-common-docker:
    name: Build common docker base layers (Stage A)
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-common-node
    if: >-
      needs.changes.outputs.identity == 'true' ||
      needs.changes.outputs.usage == 'true' ||
      needs.changes.outputs.billing == 'true' ||
      needs.changes.outputs.team == 'true' ||
      needs.changes.outputs.notification == 'true' ||
      needs.changes.outputs.web_host == 'true' ||
      needs.changes.outputs.web_mfe == 'true' ||
      needs.changes.outputs.web_shared == 'true' ||
      needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build web-node-deps base (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/web-node-deps.Dockerfile
          tags: web-node-deps:ci
          load: true
          cache-from: type=gha,scope=web-node-deps
          cache-to: type=gha,mode=max,scope=web-node-deps
      - name: Build backend-node-deps base (cache gha)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend-node-deps.Dockerfile
          tags: backend-node-deps:ci
          load: true
          cache-from: type=gha,scope=backend-node-deps
          cache-to: type=gha,mode=max,scope=backend-node-deps
      - name: Export common docker base images
        run: |
          docker save web-node-deps:ci backend-node-deps:ci -o /tmp/common-base-images.tar
      - name: Upload docker base image bundle
        uses: actions/upload-artifact@v4
        with:
          name: common-base-images
          path: /tmp/common-base-images.tar
          if-no-files-found: error
          retention-days: 1

  identity-service:
    name: Build identity-service
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-common-node
      - build-common-docker
    if: needs.changes.outputs.identity == 'true' || needs.changes.outputs.web_shared == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/identity-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (identity-web)
        run: |
          pnpm --filter identity-web run lint
          pnpm --filter identity-web test
          pnpm run build:identity-web
        working-directory: .
      - name: Download common docker base images
        uses: actions/download-artifact@v4
        with:
          name: common-base-images
          path: .ci-artifacts
      - name: Load common docker base images
        run: docker load -i .ci-artifacts/common-base-images.tar
        working-directory: .
      - name: Docker image (identity-web, standalone)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/identity-service/web/Dockerfile
          build-args: |
            WEB_NODE_DEPS_IMAGE=web-node-deps:ci
          tags: identity-web:ci
          load: true
          cache-from: type=gha,scope=identity-web-image
          cache-to: type=gha,mode=max,scope=identity-web-image

  proxy-gateway-service:
    name: Build proxy-gateway-service
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-common-java
    if: needs.changes.outputs.proxy == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/proxy-service
    steps:
      - uses: actions/checkout@v4
      - name: Download usage-events artifact
        uses: actions/download-artifact@v4
        with:
          name: usage-events-jar
          path: .ci-artifacts/usage-events
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/proxy-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon

      # api-gateway-service는 proxy-service/아래에서 함께 빌드
      - name: Grant execute permission for api-gateway-service gradlew
        run: chmod +x ../api-gateway-service/gradlew
      - name: Build and test (api-gateway-service)
        run: cd ../api-gateway-service && ./gradlew build --no-daemon

  usage-service:
    name: Build usage-service
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-common-java
      - build-common-node
      - build-common-docker
      # Testcontainers 통합 테스트가 다른 서비스 Job과 동시에 Docker를 몰아쓰지 않도록 순차 실행
      - identity-service
      - billing-service
      - team-service
      - notification-service
    if: >-
      ${{ always()
          && (
               needs.changes.outputs.usage == 'true'
            || needs.changes.outputs.web_shared == 'true'
            || needs.changes.outputs.workflows == 'true'
             )
          && needs.identity-service.result != 'failure'
          && needs.identity-service.result != 'cancelled'
          && needs.build-common-java.result != 'failure'
          && needs.build-common-java.result != 'cancelled'
          && needs.build-common-node.result != 'failure'
          && needs.build-common-node.result != 'cancelled'
          && needs.build-common-docker.result != 'failure'
          && needs.build-common-docker.result != 'cancelled'
          && needs.billing-service.result != 'failure'
          && needs.billing-service.result != 'cancelled'
          && needs.team-service.result != 'failure'
          && needs.team-service.result != 'cancelled'
          && needs.notification-service.result != 'failure'
          && needs.notification-service.result != 'cancelled'
       }}
    defaults:
      run:
        working-directory: services/usage-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/usage-service/build.gradle
      - name: Download usage-events artifact
        uses: actions/download-artifact@v4
        with:
          name: usage-events-jar
          path: .ci-artifacts/usage-events
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (usage-web)
        run: |
          pnpm --filter usage-web run lint
          pnpm --filter usage-web test
          pnpm run build:usage-web
        working-directory: .
      - name: Download common docker base images
        uses: actions/download-artifact@v4
        with:
          name: common-base-images
          path: .ci-artifacts
      - name: Load common docker base images
        run: docker load -i .ci-artifacts/common-base-images.tar
        working-directory: .
      - name: Docker image (usage-web, standalone)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/usage-service/web/Dockerfile
          build-args: |
            WEB_NODE_DEPS_IMAGE=web-node-deps:ci
          tags: usage-web:ci
          load: true
          cache-from: type=gha,scope=usage-web-image
          cache-to: type=gha,mode=max,scope=usage-web-image

  billing-service:
    name: Build billing-service
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-common-java
      - build-common-node
      - build-common-docker
    if: needs.changes.outputs.billing == 'true' || needs.changes.outputs.web_shared == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/billing-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Download usage-events artifact
        uses: actions/download-artifact@v4
        with:
          name: usage-events-jar
          path: .ci-artifacts/usage-events
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/billing-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (billing-web)
        run: |
          pnpm --filter billing-web run lint
          pnpm --filter billing-web test
          pnpm run build:billing-web
        working-directory: .
      - name: Download common docker base images
        uses: actions/download-artifact@v4
        with:
          name: common-base-images
          path: .ci-artifacts
      - name: Load common docker base images
        run: docker load -i .ci-artifacts/common-base-images.tar
        working-directory: .
      - name: Docker image (billing-web, standalone)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/billing-service/web/Dockerfile
          build-args: |
            WEB_NODE_DEPS_IMAGE=web-node-deps:ci
          tags: billing-web:ci
          load: true
          cache-from: type=gha,scope=billing-web-image
          cache-to: type=gha,mode=max,scope=billing-web-image

  team-service:
    name: Build team-service
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-common-node
      - build-common-docker
    if: needs.changes.outputs.team == 'true' || needs.changes.outputs.web_shared == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: services/team-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: services/team-service/build.gradle
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
      - name: Build and test
        run: ./gradlew build --no-daemon
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
        working-directory: .
      - name: Install workspace
        run: pnpm install --frozen-lockfile
        working-directory: .
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (team-web)
        run: |
          pnpm --filter team-web run lint
          pnpm --filter team-web test
          pnpm run build:team-web
        working-directory: .
      - name: Download common docker base images
        uses: actions/download-artifact@v4
        with:
          name: common-base-images
          path: .ci-artifacts
      - name: Load common docker base images
        run: docker load -i .ci-artifacts/common-base-images.tar
        working-directory: .
      - name: Docker image (team-web, standalone)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/team-service/web/Dockerfile
          build-args: |
            WEB_NODE_DEPS_IMAGE=web-node-deps:ci
          tags: team-web:ci
          load: true
          cache-from: type=gha,scope=team-web-image
          cache-to: type=gha,mode=max,scope=team-web-image

  notification-service:
    name: Build notification-service
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-common-node
      - build-common-docker
    if: needs.changes.outputs.notification == 'true' || needs.changes.outputs.web_shared == 'true' || needs.changes.outputs.workflows == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Build (Nest)
        run: pnpm --filter notification-service run build
      - name: Download common docker base images
        uses: actions/download-artifact@v4
        with:
          name: common-base-images
          path: .ci-artifacts
      - name: Load common docker base images
        run: docker load -i .ci-artifacts/common-base-images.tar
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (notification-web)
        run: |
          pnpm --filter notification-web run lint
          pnpm --filter notification-web test
          pnpm --filter notification-web run build
      - name: Docker image (notification-service)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/notification-service/Dockerfile
          build-args: |
            BACKEND_NODE_DEPS_IMAGE=backend-node-deps:ci
          tags: notification-service:ci
          load: true
          cache-from: type=gha,scope=notification-service-image
          cache-to: type=gha,mode=max,scope=notification-service-image
      - name: Docker image (notification-web, standalone)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/notification-service/web/Dockerfile
          build-args: |
            WEB_NODE_DEPS_IMAGE=web-node-deps:ci
          tags: notification-web:ci
          load: true
          cache-from: type=gha,scope=notification-web-image
          cache-to: type=gha,mode=max,scope=notification-web-image

  web-host:
    name: Build web-host (apps/web)
    runs-on: ubuntu-latest
    needs: changes
    # Temporary emergency bypass: skip web-host CI until prerender/useContext issue is fixed.
    if: false
    env:
      NEXT_PRIVATE_LOCAL_WEBPACK: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / test / build (web-host)
        run: |
          pnpm --filter web-host run lint
          pnpm --filter web-host run test
          pnpm --filter web-host run build
      - name: Verify host remotes configuration
        run: |
          node -e "const fs=require('node:fs');const p='apps/web/next.config.mjs';const c=fs.readFileSync(p,'utf8');for(const x of ['NextFederationPlugin','team@','usage@','remoteEntry.js']){if(!c.includes(x)){throw new Error('missing '+x+' in '+p)}}"
      - name: Docker image (web-host, standalone)
        run: docker build -f docker/web-node-deps.Dockerfile -t web-node-deps:ci . && docker build --build-arg WEB_NODE_DEPS_IMAGE=web-node-deps:ci -f apps/web/Dockerfile -t web-host:ci .

  web-mfe:
    name: Build web-mfe remotes (usage/team)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web_mfe == 'true' || needs.changes.outputs.web_shared == 'true' || needs.changes.outputs.workflows == 'true'
    env:
      NEXT_PRIVATE_LOCAL_WEBPACK: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Reset pnpm store metadata
        run: pnpm store prune
      - name: Install workspace
        run: pnpm install --frozen-lockfile
      - name: Verify MF plugin settings (usage/team remotes)
        run: |
          node -e "const fs=require('node:fs');const checks=[['services/usage-service/web-mfe/next.config.ts',['NextFederationPlugin','name: \"usage\"','filename: \"static/chunks/remoteEntry.js\"']],['services/team-service/web-mfe/next.config.ts',['NextFederationPlugin','name: \"team\"','filename: \"static/chunks/remoteEntry.js\"']]];for(const [p,needles] of checks){const c=fs.readFileSync(p,'utf8');for(const n of needles){if(!c.includes(n)){throw new Error('missing '+n+' in '+p)}}}"
      # ESLint: omit --max-warnings so only errors fail the step; warnings do not stop CI
      - name: Lint / typecheck / build (web-mfe)
        run: |
          pnpm --filter usage-web-mfe run lint
          pnpm --filter team-web-mfe run lint
          pnpm --filter usage-web-mfe exec tsc --noEmit
          pnpm --filter team-web-mfe exec tsc --noEmit
          pnpm --filter usage-web-mfe run build
          pnpm --filter team-web-mfe run build
      - name: Docker image (usage-web-mfe, standalone)
        run: docker build -f docker/web-node-deps.Dockerfile -t web-node-deps:ci . && docker build --build-arg WEB_NODE_DEPS_IMAGE=web-node-deps:ci -f services/usage-service/web-mfe/Dockerfile -t usage-web-mfe:ci .
      - name: Docker image (team-web-mfe, standalone)
        run: docker build --build-arg WEB_NODE_DEPS_IMAGE=web-node-deps:ci -f services/team-service/web-mfe/Dockerfile -t team-web-mfe:ci .

  # Single required check for branch protection.
  # Skipped Java/Compose jobs (path filter) do not fail the workflow.
  ci-observability:
    name: CI observability metrics
    runs-on: ubuntu-latest
    needs:
      - changes
      - gitleaks
      - compose-validate
      - build-common-java
      - build-common-node
      - build-common-docker
      - identity-service
      - proxy-gateway-service
      - usage-service
      - billing-service
      - team-service
      - notification-service
      - web-host
      - web-mfe
    if: always()
    steps:
      - name: Collect job metrics from Actions API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" > jobs.json
          echo "## CI Job Duration Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result | Duration(s) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---:|---:|" >> "$GITHUB_STEP_SUMMARY"
          jq -r '.jobs[] | [.name, .conclusion, ((.completed_at|fromdateiso8601) - (.started_at|fromdateiso8601)|tostring)] | @tsv' jobs.json \
            | while IFS=$'\t' read -r name result dur; do
                echo "| $name | $result | $dur |" >> "$GITHUB_STEP_SUMMARY"
              done
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Cache/Container observation notes" >> "$GITHUB_STEP_SUMMARY"
          echo "- setup-node cache-hit 값은 Stage A build-common-node 로그를 참고" >> "$GITHUB_STEP_SUMMARY"
          echo "- Docker 단계 시간은 각 Job step duration(표)에서 Docker step 포함 Job을 비교" >> "$GITHUB_STEP_SUMMARY"
          echo "- usage 통합테스트 컨테이너 기동 여유는 withStartupTimeout(5m) 적용 상태" >> "$GITHUB_STEP_SUMMARY"

  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs:
      - changes
      - gitleaks
      - compose-validate
      - build-common-java
      - build-common-node
      - build-common-docker
      - identity-service
      - proxy-gateway-service
      - usage-service
      - billing-service
      - team-service
      - notification-service
      - web-host
      - web-mfe
      - ci-observability
    if: always()
    steps:
      - name: Assert required jobs
        run: |
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes job did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          if [[ "${{ needs.gitleaks.result }}" != "success" ]]; then
            echo "gitleaks did not succeed: ${{ needs.gitleaks.result }}"
            exit 1
          fi
          if [[ "${{ needs.compose-validate.result }}" != "success" ]]; then
            echo "compose-validate did not succeed: ${{ needs.compose-validate.result }}"
            exit 1
          fi
          for name in build-common-java build-common-node build-common-docker identity-service proxy-gateway-service usage-service billing-service team-service notification-service web-host web-mfe ci-observability; do
            case "$name" in
              build-common-java) v="${{ needs['build-common-java'].result }}" ;;
              build-common-node) v="${{ needs['build-common-node'].result }}" ;;
              build-common-docker) v="${{ needs['build-common-docker'].result }}" ;;
              identity-service) v="${{ needs.identity-service.result }}" ;;
              proxy-gateway-service) v="${{ needs.proxy-gateway-service.result }}" ;;
              usage-service) v="${{ needs.usage-service.result }}" ;;
              billing-service) v="${{ needs.billing-service.result }}" ;;
              team-service) v="${{ needs.team-service.result }}" ;;
              notification-service) v="${{ needs.notification-service.result }}" ;;
              web-host) v="${{ needs['web-host'].result }}" ;;
              web-mfe) v="${{ needs['web-mfe'].result }}" ;;
              ci-observability) v="${{ needs['ci-observability'].result }}" ;;
            esac
            if [[ "$v" == "failure" || "$v" == "cancelled" ]]; then
              echo "$name ended with $v"
              exit 1
            fi
          done
          echo "All required checks passed or were skipped appropriately."